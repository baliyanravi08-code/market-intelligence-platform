<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Options Intel v2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;600;700&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg0: #010b15;
  --bg1: #040f1a;
  --bg2: #060f1e;
  --bg3: #0a1828;
  --bg4: #0d2035;
  --border: #1a3548;
  --border2: #243f58;
  --text1: #e8f2ff;
  --text2: #c8d8e8;
  --text3: #8aacc2;
  --text4: #4a7090;
  --cyan: #00cfff;
  --green: #00ff9c;
  --red: #ef5350;
  --amber: #ffd54f;
  --blue: #4fc3f7;
  --purple: #d090ff;
  --orange: #ff8a65;
  --pink: #ff5cff;
  --scanline-color: rgba(0,207,255,0.025);
}

html, body { height: 100%; background: var(--bg0); overflow: hidden; }

/* CRT scanline overlay */
body::before {
  content: '';
  position: fixed; inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 1px, var(--scanline-color) 1px, var(--scanline-color) 2px);
  pointer-events: none; z-index: 9999;
}

/* Scrollbars */
::-webkit-scrollbar { width: 3px; height: 3px; }
::-webkit-scrollbar-track { background: var(--bg1); }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

/* Keyframes */
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
@keyframes glow { 0%,100%{box-shadow:0 0 4px currentColor} 50%{box-shadow:0 0 14px currentColor,0 0 28px currentColor} }
@keyframes ticker { from{transform:translateX(0)} to{transform:translateX(-50%)} }
@keyframes fadeIn { from{opacity:0;transform:translateY(3px)} to{opacity:1;transform:translateY(0)} }
@keyframes scanPulse { 0%,100%{opacity:.4} 50%{opacity:.9} }
@keyframes barIn { from{width:0} to{width:var(--w)} }
@keyframes sparkDraw { from{stroke-dashoffset:var(--len)} to{stroke-dashoffset:0} }

#app {
  display: flex; flex-direction: column;
  height: 100vh; overflow: hidden;
  font-family: 'IBM Plex Mono', monospace;
  color: var(--text1);
  background:
    radial-gradient(ellipse 80% 40% at 50% -10%, rgba(0,207,255,0.07) 0%, transparent 70%),
    var(--bg0);
  animation: fadeIn .3s ease;
}

/* ─── TOOLBAR ─────────────────────────────────────────────────────────── */
#toolbar {
  display: flex; align-items: center; gap: 8px;
  padding: 0 12px;
  height: 40px; flex-shrink: 0;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  position: relative;
}
#toolbar::after {
  content: '';
  position: absolute; bottom: -1px; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, var(--cyan), transparent);
  opacity: .4;
}

.logo {
  font-size: 9px; font-weight: 700; letter-spacing: 2px;
  color: var(--cyan); flex-shrink: 0;
  text-shadow: 0 0 8px var(--cyan);
}

.sym-btn {
  padding: 2px 9px; border-radius: 2px; cursor: pointer;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 8px; font-weight: 700; letter-spacing: .5px;
  background: transparent; border: 1px solid var(--border);
  color: var(--text4); transition: all .15s;
  flex-shrink: 0;
}
.sym-btn:hover { border-color: var(--border2); color: var(--text2); }
.sym-btn.active {
  background: rgba(0,207,255,.1);
  border-color: rgba(0,207,255,.5);
  color: var(--cyan);
  box-shadow: 0 0 8px rgba(0,207,255,.2);
}

.spacer { flex: 1; }

/* alert strip */
.alert-strip {
  display: flex; flex-direction: column; gap: 0;
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: 4px; padding: 4px 8px;
  min-width: 170px; max-width: 250px; flex-shrink: 0;
  max-height: 68px; overflow: hidden;
}
.alert-strip-head {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 3px;
}
.alert-strip-head span { font-size: 7px; font-weight: 700; letter-spacing: 1px; color: var(--text2); }
.alert-count {
  font-size: 7px; padding: 1px 4px; border-radius: 2px;
  background: rgba(239,83,80,.15); color: var(--red); font-weight: 700;
}
.alert-row {
  display: flex; align-items: flex-start; gap: 4px;
  font-size: 7px; line-height: 1.35; color: var(--red);
  padding: 1px 0; border-bottom: 1px solid var(--border);
}
.alert-row:last-child { border-bottom: none; }
.alert-row.medium { color: var(--amber); }
.alert-row.high { animation: pulse 1.4s infinite; }
.alert-icon { flex-shrink: 0; margin-top: 1px; }
.alert-msg { flex: 1; }
.alert-age { color: var(--text4); flex-shrink: 0; font-size: 6px; margin-top: 1px; }

.live-dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--green); flex-shrink: 0;
  animation: pulse 1.5s infinite;
  box-shadow: 0 0 6px var(--green);
}
.live-label { font-size: 7px; color: var(--text4); flex-shrink: 0; }

/* ─── BODY ────────────────────────────────────────────────────────────── */
#body {
  flex: 1; display: flex; flex-direction: column;
  padding: 7px 8px; gap: 7px; overflow: hidden; min-height: 0;
}

/* ─── SCORE CARD ─────────────────────────────────────────────────────── */
#scorecard {
  flex-shrink: 0; border-radius: 6px;
  padding: 9px 14px; display: flex; align-items: center; gap: 14px;
  border: 1px solid var(--border);
  background: var(--bg2);
  position: relative; overflow: hidden;
}
#scorecard::before {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(90deg, var(--score-color, #00ff9c) 0%, transparent 25%);
  opacity: .04; pointer-events: none;
}

.score-block { display: flex; flex-direction: column; align-items: center; flex-shrink: 0; min-width: 50px; }
.score-num { font-size: 36px; font-weight: 700; line-height: 1; }
.score-label { font-size: 7px; font-weight: 700; letter-spacing: 1px; margin-top: 1px; }

.score-sym { flex-shrink: 0; min-width: 120px; }
.score-sym-row { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
.score-sym-name { font-size: 14px; font-weight: 700; color: var(--text1); }
.score-bias { font-size: 9px; font-weight: 700; }
.gann-badge-compact {
  display: inline-flex; align-items: center; gap: 2px;
  padding: 1px 6px; border-radius: 3px;
  font-size: 8px; font-weight: 700; cursor: default;
  border: 1px solid; letter-spacing: .3px;
}
.strats { display: flex; gap: 3px; flex-wrap: wrap; }
.strat-tag {
  font-size: 7px; font-weight: 700; padding: 1px 5px; border-radius: 2px;
  border: 1px solid; white-space: nowrap; letter-spacing: .3px;
}

.vdiv { width: 1px; background: var(--border); align-self: stretch; margin: 0 6px; flex-shrink: 0; }

.stats-row {
  display: flex; gap: 10px; align-items: flex-start;
  flex: 1; overflow-x: auto; flex-wrap: nowrap;
}
.stat {
  display: flex; flex-direction: column; gap: 1px;
  min-width: 50px; flex-shrink: 0;
}
.stat-label { font-size: 7px; color: var(--text2); letter-spacing: .8px; text-transform: uppercase; white-space: nowrap; }
.stat-val { font-size: 11px; font-weight: 700; line-height: 1.1; }
.stat-sub { font-size: 6.5px; color: var(--text3); }

.iv-rank-wrap { min-width: 76px; flex-shrink: 0; }
.iv-rank-row { display: flex; justify-content: space-between; font-size: 7px; margin-bottom: 2px; }
.rank-bar-bg { height: 4px; background: var(--bg4); border-radius: 2px; overflow: hidden; }
.rank-bar-fg { height: 4px; border-radius: 2px; transition: width .6s ease; }
.rank-pct { font-size: 6px; color: var(--text3); margin-top: 1px; }

/* sparkline container (spot history) */
.spark-wrap { flex-shrink: 0; width: 70px; display: flex; flex-direction: column; gap: 2px; align-items: center; }
.spark-label { font-size: 6.5px; color: var(--text3); letter-spacing: .5px; }

/* ─── PANEL GRID ─────────────────────────────────────────────────────── */
#panels {
  flex: 1; display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 7px; min-height: 0; overflow: hidden;
}

.panel {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 6px; padding: 10px 12px;
  display: flex; flex-direction: column;
  overflow-y: auto; min-height: 0;
  animation: fadeIn .25s ease;
}
.panel-title {
  font-size: 8px; font-weight: 700; color: var(--text3);
  letter-spacing: 1.5px; text-transform: uppercase;
  border-bottom: 1px solid var(--border); padding-bottom: 5px;
  margin-bottom: 8px; flex-shrink: 0;
}

/* GEX bars */
.gex-bar-wrap { margin-bottom: 7px; }
.gex-bar-head { display: flex; justify-content: space-between; font-size: 9px; margin-bottom: 3px; }
.gex-bar-bg { height: 6px; background: var(--bg4); border-radius: 3px; overflow: hidden; position: relative; }
.gex-bar-fill {
  height: 6px; border-radius: 3px;
  --w: 0%; width: var(--w);
  animation: barIn .7s cubic-bezier(.4,0,.2,1) forwards;
  position: relative;
}
.gex-bar-fill::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(90deg, transparent 70%, rgba(255,255,255,.25));
  border-radius: 3px;
}

.gex-regime-tag {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 7px; border-radius: 3px; font-size: 7px; font-weight: 700;
  border: 1px solid; margin-bottom: 8px;
}

.mini-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
.mini-card {
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: 4px; padding: 5px 8px;
}
.mini-card-label { font-size: 7px; color: var(--text2); letter-spacing: .8px; margin-bottom: 2px; display: block; }
.mini-card-val { font-size: 12px; font-weight: 700; line-height: 1.1; display: block; word-break: break-word; }
.mini-card-sub { font-size: 6.5px; color: var(--text3); margin-top: 1px; display: block; }

.sub-title {
  font-size: 7px; font-weight: 700; color: var(--text3);
  letter-spacing: 1px; text-transform: uppercase;
  border-bottom: 1px solid var(--border); padding-bottom: 3px;
  margin: 8px 0 5px; flex-shrink: 0;
}

/* OI rows */
.oi-tabs { display: flex; gap: 4px; margin-bottom: 6px; }
.oi-tab {
  flex: 1; font-size: 7px; font-weight: 700; letter-spacing: .5px;
  padding: 3px 2px; border-radius: 3px; cursor: pointer;
  border: 1px solid var(--border); background: transparent;
  color: var(--text4); transition: all .15s;
  font-family: 'IBM Plex Mono', monospace;
}
.oi-tab.active-near { background: rgba(79,195,247,.1); border-color: rgba(79,195,247,.4); color: var(--blue); }
.oi-tab.active-tail { background: rgba(208,144,255,.1); border-color: rgba(208,144,255,.4); color: var(--purple); }

.oi-hdr {
  display: grid; grid-template-columns: 26px 52px 1fr 1fr 44px;
  gap: 3px; font-size: 7px; color: var(--text4); letter-spacing: .5px;
  padding-bottom: 3px; border-bottom: 1px solid var(--border); margin-bottom: 2px;
}
.oi-row {
  display: grid; grid-template-columns: 26px 52px 1fr 1fr 44px;
  gap: 3px; padding: 3px 2px; border-radius: 2px; align-items: center;
  transition: background .1s;
}
.oi-row:nth-child(even) { background: rgba(6,15,28,.6); }
.oi-row:hover { background: var(--bg4); }
.oi-type {
  font-size: 7px; font-weight: 700; padding: 1px 2px;
  border-radius: 2px; border: 1px solid; text-align: center; display: block;
}
.oi-strike { font-size: 8px; font-weight: 700; color: var(--text1); }
.oi-oi { font-size: 7px; color: var(--text2); text-align: right; display: block; }
.oi-vol { font-size: 7px; color: var(--pink); text-align: right; display: block; }
.oi-dist { font-size: 7px; font-weight: 700; text-align: right; display: block; }

.oi-pgn { display: flex; align-items: center; justify-content: space-between; padding-top: 4px; border-top: 1px solid var(--border); margin-top: 4px; }
.oi-pgn-info { font-size: 7px; color: var(--text4); }
.oi-pgn-btns { display: flex; gap: 3px; }
.oi-pgn-btn {
  font-size: 8px; padding: 1px 6px; border-radius: 2px;
  border: 1px solid var(--border); background: transparent;
  color: var(--text4); cursor: pointer;
  font-family: 'IBM Plex Mono', monospace; transition: all .1s;
}
.oi-pgn-btn:not(:disabled):hover { background: var(--bg4); color: var(--text2); border-color: var(--border2); }
.oi-pgn-btn:disabled { opacity: .35; cursor: default; }

/* Gann panel */
.gann-head {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 8px; border-radius: 5px; border: 1px solid; margin-bottom: 8px;
}
.gann-score-ring {
  width: 48px; height: 48px; flex-shrink: 0; position: relative;
}
.gann-score-num { font-size: 20px; font-weight: 700; display: block; text-align: center; line-height: 1; }
.gann-score-sub { font-size: 7px; opacity: .6; display: block; text-align: center; }
.gann-head-body { flex: 1; }
.gann-bias-label { font-size: 12px; font-weight: 700; display: block; }
.gann-summary { font-size: 7.5px; color: var(--text3); line-height: 1.35; display: block; margin-top: 2px; }

.gann-levels { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-bottom: 7px; }
.gann-level-card { background: var(--bg3); border-radius: 4px; padding: 5px 7px; }
.gann-level-head { font-size: 7px; color: var(--text2); letter-spacing: 1px; margin-bottom: 3px; display: block; }
.gann-level-row { display: flex; justify-content: space-between; font-size: 8px; padding: 1px 0; }

.son-wrap { margin-bottom: 7px; }
.son-row { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
.son-angle { font-size: 8px; color: var(--blue); }
.son-strength {
  font-size: 7px; padding: 1px 4px; border-radius: 2px;
  font-weight: 700;
}
.son-label { font-size: 7px; color: var(--text3); margin-top: 2px; display: block; }

.cycle-row {
  display: flex; justify-content: space-between; align-items: center;
  font-size: 8px; padding: 3px 0; border-bottom: 1px solid var(--border);
}
.cycle-label { color: var(--text2); flex: 1; padding-right: 6px; line-height: 1.3; }
.cycle-timing { white-space: nowrap; font-size: 7px; font-weight: 700; }

.gann-alert {
  padding: 4px 6px; background: rgba(239,83,80,.08);
  border: 1px solid rgba(239,83,80,.25); border-radius: 3px;
  margin-bottom: 3px; font-size: 8px; color: var(--red); font-weight: 700;
  animation: pulse 1.8s infinite;
}
.gann-headline {
  font-size: 8px; color: var(--text3); margin-top: 5px;
  line-height: 1.45; padding: 5px 7px;
  background: var(--bg3); border-radius: 3px; border: 1px solid var(--border);
}

/* Structure panel */
.zone-badge {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 3px 8px; border-radius: 3px; margin-bottom: 6px;
  border: 1px solid; font-size: 8px; font-weight: 700;
}
.zone-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }

.range-bar-wrap { margin-bottom: 8px; }
.range-bar-labels { display: flex; justify-content: space-between; font-size: 7px; color: var(--text4); margin-bottom: 2px; }
.range-bar-bg { height: 6px; background: var(--bg4); border-radius: 3px; position: relative; overflow: visible; }
.range-bar-fill { height: 6px; border-radius: 3px; background: linear-gradient(90deg, rgba(255,138,101,.4), rgba(255,213,79,.4)); transition: width .6s ease; }
.range-bar-needle {
  position: absolute; top: -2px; width: 2px; height: 10px;
  background: var(--text1); border-radius: 1px;
  transform: translateX(-50%); transition: left .4s ease;
  box-shadow: 0 0 4px rgba(255,255,255,.5);
}

.lvl-row {
  display: flex; justify-content: space-between;
  padding: 3px 0; border-bottom: 1px solid var(--border); font-size: 8px;
}
.lvl-label { color: var(--text2); }
.lvl-val { font-weight: 700; }

/* GEX MINI CHART (top strikes) */
.gex-strike-bar {
  display: flex; align-items: center; gap: 5px;
  font-size: 8px; padding: 2px 0; border-bottom: 1px solid rgba(26,53,72,.5);
}
.gex-strike-label { width: 50px; color: var(--text2); flex-shrink: 0; }
.gex-strike-track { flex: 1; height: 4px; background: var(--bg4); border-radius: 2px; overflow: hidden; }
.gex-strike-fill { height: 4px; border-radius: 2px; --w: 0%; width: var(--w); animation: barIn .6s ease forwards; }
.gex-strike-val { width: 40px; text-align: right; font-size: 7px; font-weight: 700; }

/* Greeks mini ring (SVG donut) */
.greeks-ring-wrap { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.greeks-ring-items { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; flex: 1; }
.greek-item { display: flex; flex-direction: column; }
.greek-label { font-size: 7px; color: var(--text3); letter-spacing: .5px; }
.greek-val { font-size: 10px; font-weight: 700; }
.greek-sub { font-size: 6px; color: var(--text3); }

/* Volatility micro-heatmap */
.vol-heatmap { display: grid; grid-template-columns: repeat(5, 1fr); gap: 2px; margin-bottom: 8px; }
.vol-cell {
  height: 20px; border-radius: 2px; display: flex; align-items: center;
  justify-content: center; font-size: 6.5px; font-weight: 700;
  border: 1px solid rgba(255,255,255,.05);
  transition: transform .15s;
  cursor: default;
}
.vol-cell:hover { transform: scale(1.08); z-index: 10; }
.vol-heatmap-labels { display: grid; grid-template-columns: repeat(5, 1fr); gap: 2px; margin-bottom: 5px; }
.vol-heatmap-label { font-size: 6px; color: var(--text4); text-align: center; letter-spacing: .3px; }

/* Inline "chart" for spot history sparkline */
.spark-svg { overflow: visible; }

</style>
</head>
<body>
<div id="app">
  <div id="toolbar"></div>
  <div id="body">
    <div id="scorecard"></div>
    <div id="panels"></div>
  </div>
</div>

<script>
// ── Safe socket.io bootstrap ──────────────────────────────────────────────
// Load socket.io dynamically so a 404 never crashes the page.
// The UI renders immediately with default state; sockets wire up once loaded.
(function() {
  const s = document.createElement('script');
  s.src = '/socket.io/socket.io.js';
  s.onload  = () => window._socketIOReady && window._socketIOReady();
  s.onerror = () => {
    console.warn('[Options Intel] socket.io not available — running in offline mode');
    window._socketOffline = true;
    window._socketIOReady && window._socketIOReady();
  };
  document.head.appendChild(s);
})();
</script>

};

// Spot history (rolling 24-point window per symbol, for sparkline)

// UI state

let oiView   = "near";
let oiScroll = 0;
const OI_ROWS = 7;

// Live alerts (from "options-alert" socket events)
let alerts = [];
const MAX_ALERTS = 6;

// Connection state
let isConnected = false;

// ── Socket.io connection (wired after script loads safely) ────────────────
window._socketIOReady = function() {
  if (window._socketOffline || typeof io === 'undefined') {
    console.warn('[Options Intel] offline mode — UI rendered with default state');
    return;
  }
  const socket = io({ transports: ["websocket", "polling"] });

  socket.on("connect", () => {
    console.log("✅ Options Intel: socket connected");
    isConnected = true;
    renderToolbar();
  });
  socket.on("disconnect", () => {
    console.warn("⚠️  Options Intel: socket disconnected");
    isConnected = false;
    renderToolbar();
  });

  socket.on("options-intel", (data) => {
    if (!data?.symbol) return;
    const sym = data.symbol;
    if (!STATE[sym]) return;
    Object.assign(STATE[sym], data);
    if (data.spot && data.spot > 0) {
      spotHistory[sym].push(data.spot);
      if (spotHistory[sym].length > 24) spotHistory[sym].shift();
    }
    if (active === sym) render();
  });

  socket.on("gann-update", (data) => {
    if (!data?.symbol) return;
    GANN_STATE[data.symbol] = data;
    if (active === data.symbol) render();
  });

  socket.on("options-alert", (alert) => {
    if (!alert?.message) return;
    const already = alerts.some(a => a.message === alert.message && Date.now() - a.ts < 60_000);
    if (!already) {
      alerts.unshift({ ...alert, ts: alert.ts || Date.now() });
      if (alerts.length > MAX_ALERTS) alerts = alerts.slice(0, MAX_ALERTS);
      renderToolbar();
    }
  });

  socket.on("market-tick", (updates) => {
    if (!Array.isArray(updates)) return;
    let changed = false;
    for (const tick of updates) {
      const sym = tick.name;
      if (!STATE[sym]) continue;
      if (tick.raw && tick.raw > 0) {
        STATE[sym].spot = tick.raw;
        STATE[sym].ltp  = tick.raw;
        spotHistory[sym].push(tick.raw);
        if (spotHistory[sym].length > 24) spotHistory[sym].shift();
        if (sym === active) changed = true;
      }
    }
    if (changed) renderScoreCard();
  });
};

// ── DOM helpers ───────────────────────────────────────────────────────────
function h(tag, props={}, ...children) {
  const el = document.createElement(tag);
  for(const [k,v] of Object.entries(props)) {
    if(k==='class') el.className = v;
    else if(k==='style' && typeof v==='object') Object.assign(el.style, v);
    else if(k.startsWith('on')) el.addEventListener(k.slice(2).toLowerCase(), v);
    else el.setAttribute(k, v);
  }
  for(const child of children.flat()) {
    if(child==null||child===false) continue;
    el.appendChild(typeof child==='string'||typeof child==='number'
      ? document.createTextNode(String(child)) : child);
  }
  return el;
}
function svgEl(tag, attrs={}) {
  const el = document.createElementNS('http://www.w3.org/2000/svg', tag);
  for(const [k,v] of Object.entries(attrs)) el.setAttribute(k, v);
  return el;
}

// ── Sparkline SVG ─────────────────────────────────────────────────────────
function buildSparkline(history, color, w=70, ht=24) {
  if(!history||history.length<2) return null;
  const mn = Math.min(...history), mx = Math.max(...history);
  const range = mx - mn || 1;
  const pts = history.map((v,i) => {
    const x = (i/(history.length-1))*w;
    const y = ht - ((v-mn)/range)*(ht-4) - 2;
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  });
  const polyline = pts.join(' ');
  const fillPts = `0,${ht} ` + polyline + ` ${w},${ht}`;
  const svg = svgEl('svg', {viewBox:`0 0 ${w} ${ht}`, width:w, height:ht, class:'spark-svg'});
  const defs = svgEl('defs');
  const gradId = 'spark-grad-'+Math.random().toString(36).slice(2,6);
  const grad = svgEl('linearGradient', {id:gradId, x1:'0', y1:'0', x2:'0', y2:'1'});
  const s1 = svgEl('stop', {offset:'0%'}); s1.setAttribute('stop-color', color); s1.setAttribute('stop-opacity', '0.25');
  const s2 = svgEl('stop', {offset:'100%'}); s2.setAttribute('stop-color', color); s2.setAttribute('stop-opacity', '0.01');
  grad.appendChild(s1); grad.appendChild(s2); defs.appendChild(grad); svg.appendChild(defs);
  svg.appendChild(svgEl('polygon', {points: fillPts, fill:`url(#${gradId})`}));
  svg.appendChild(svgEl('polyline', {points: polyline, fill:'none', stroke:color, 'stroke-width':'1.2', 'stroke-linejoin':'round', 'stroke-linecap':'round'}));
  const last = pts[pts.length-1].split(',');
  svg.appendChild(svgEl('circle', {cx:last[0], cy:last[1], r:'2', fill:color, 'filter':'drop-shadow(0 0 3px '+color+')'}));
  return svg;
}

// ── Score donut ring ──────────────────────────────────────────────────────
function scoreDonut(score, color, size=52) {
  const R = size/2 - 5, cx = size/2, cy = size/2;
  const circ = 2*Math.PI*R;
  const dash = (score/100)*circ;
  const svg = svgEl('svg', {viewBox:`0 0 ${size} ${size}`, width:size, height:size});
  svg.appendChild(svgEl('circle', {cx, cy, r:R, fill:'none', stroke:'#1a3548', 'stroke-width':'4'}));
  svg.appendChild(svgEl('circle', {cx, cy, r:R, fill:'none', stroke:color, 'stroke-width':'4',
    'stroke-dasharray':`${dash.toFixed(1)} ${circ.toFixed(1)}`,
    'stroke-dashoffset': circ*0.25,
    'stroke-linecap':'round',
    style:`filter:drop-shadow(0 0 4px ${color})`}));
  return svg;
}
function gannRing(score, color) { return scoreDonut(score||0, color, 48); }

  if(g.netGEX===0 && g.callGEX===0) {
    p.appendChild(h('div', {style:{fontSize:'7px',color:'#4a7090',textAlign:'center',padding:'8px 0'}},
      '◌ Awaiting live GEX data…'));
  }

  return p;
}

// ═══════════════════════════════════════════════════════════════════════════
//  OI PANEL
// ═══════════════════════════════════════════════════════════════════════════
function renderOI(d) {
  const oi = d.oi, spot = d.spot;
  const oiC = oi.pcr>1.2?'#00ff9c':oi.pcr<0.8?'#ef5350':'#ffd54f';

  const p = h('div', {class:'panel'});
  p.appendChild(h('div', {class:'panel-title'}, '◎ OI Intelligence'));

  function mc(label, val, sub, color) {
    return h('div', {class:'mini-card'},
      h('span', {class:'mini-card-label'}, label),
      h('span', {class:'mini-card-val', style:{color:color||'#e8f2ff'}}, String(val)),
      sub ? h('span', {class:'mini-card-sub'}, sub) : null
    );
  }

  const grid = h('div', {class:'mini-grid', style:{marginBottom:'6px'}});
  grid.appendChild(mc('PCR', oi.pcr>0?fmt2(oi.pcr):'—', 'put/call', oiC));
  grid.appendChild(mc('MAX PAIN', oi.maxPain?fmtI(oi.maxPain):'—', 'expiry', '#4fc3f7'));
  const tot = (oi.totalCallOI||0)+(oi.totalPutOI||0);
  grid.appendChild(mc('TOTAL OI', tot>0?(tot/1e5).toFixed(1)+'L':'—'));
  grid.appendChild(mc('NET FLOW', oi.netPremiumFlow!=null?fmtCr(oi.netPremiumFlow):'—',
    null, (oi.netPremiumFlow||0)>0?'#00ff9c':'#ef5350'));
  p.appendChild(grid);

  const oiSumText = oi.pcr>1.2 ? 'Put dominance → bullish (mm hedge)'
    : oi.pcr<0.8 ? 'Call dominance → market complacent'
    : oi.pcr>0 ? 'Balanced PCR → neutral' : null;
  if(oiSumText) {
    p.appendChild(h('div', {style:{
      fontSize:'7px', color:oiC, marginBottom:'6px', padding:'3px 6px',
      background:oiC+'10', borderRadius:'3px', border:`1px solid ${oiC}22`
    }}, '◈ '+oiSumText));
  }

  // Tabs
  const tabs = h('div', {class:'oi-tabs'});
  [{key:'near',label:'NEAR ATM ±8%',colorClass:'near'},{key:'tail',label:'FII HEDGE / TAIL',colorClass:'tail'}].forEach(t => {
    tabs.appendChild(h('button', {
      class:`oi-tab ${oiView===t.key?`active-${t.colorClass}`:''}`,
      onClick: () => { oiView=t.key; oiScroll=0; render(); }
    }, t.label));
  });
  p.appendChild(tabs);

  const rows = oiView==='near' ? oi.unusualOI : (oi.unusualOITailRisk||[]);
  const sorted = [...(rows||[])].sort((a,b)=>{
    const da=spot?Math.abs(a.strike-spot):0, db=spot?Math.abs(b.strike-spot):0;
    return da!==db ? da-db : (a.type||'').toUpperCase()==='CALL'?-1:1;
  });
  const visible = sorted.slice(oiScroll, oiScroll+OI_ROWS);
  const canUp = oiScroll>0, canDn = oiScroll+OI_ROWS<sorted.length;

  p.appendChild(h('div', {class:'oi-hdr'},
    h('span',{},''),
    h('span',{},'STRIKE'),
    h('span',{style:{textAlign:'right'}},'OI'),
    h('span',{style:{textAlign:'right'}},'VOL'),
    h('span',{style:{textAlign:'right'}},'DIST%')
  ));

  if(visible.length===0) {
    p.appendChild(h('div', {style:{fontSize:'7px',color:'#5a90a8',textAlign:'center',padding:'10px 0'}},
      oi.totalCallOI===0 ? '◌ Awaiting OI data…' : '◌ No data for this view'));
  } else {
    visible.forEach(u => {
      const isCE = (u.type||'').toUpperCase()==='CALL';
      const dist = spot ? calcP(u.strike, spot) : null;
      const tc = isCE?'#4fc3f7':'#ff8a65';
      p.appendChild(h('div', {class:'oi-row'},
        h('span', {class:'oi-type', style:{background:tc+'18',color:tc,borderColor:tc+'33'}}, isCE?'CE':'PE'),
        h('span', {class:'oi-strike'}, fmtI(u.strike)),
        h('span', {class:'oi-oi'}, (u.oi||0).toLocaleString('en-IN')),
        h('span', {class:'oi-vol'}, (u.vol||0).toLocaleString('en-IN')),
        h('span', {class:'oi-dist', style:{color:dist!=null?(dist>0?'#4fc3f7':'#ff8a65'):'#5a90a8'}},
          dist!=null?(dist>0?'+':'')+dist+'%':'—')
      ));
    });
  }

  const pgn = h('div', {class:'oi-pgn'});
  pgn.appendChild(h('span', {class:'oi-pgn-info'},
    sorted.length>0?`${oiScroll+1}–${Math.min(oiScroll+OI_ROWS,sorted.length)} / ${sorted.length}`:'0'));
  const btnWrap = h('div', {class:'oi-pgn-btns'});
  const bUp = h('button', {class:'oi-pgn-btn', ...(canUp?{}:{disabled:''}),
    ...(canUp?{onClick:()=>{oiScroll=Math.max(0,oiScroll-OI_ROWS);render();}}:{})}, '▲');
  const bDn = h('button', {class:'oi-pgn-btn', ...(canDn?{}:{disabled:''}),
    ...(canDn?{onClick:()=>{oiScroll=Math.min(sorted.length-OI_ROWS,oiScroll+OI_ROWS);render();}}:{})}, '▼');
  btnWrap.appendChild(bUp); btnWrap.appendChild(bDn);
  pgn.appendChild(btnWrap);
  p.appendChild(pgn);

  return p;
}

// ═══════════════════════════════════════════════════════════════════════════
//  GANN PANEL
// ═══════════════════════════════════════════════════════════════════════════
function renderGann(gann) {
  const p = h('div', {class:'panel'});
  p.appendChild(h('div', {class:'panel-title'}, '◤ Gann Analysis'));

  if(!gann) {
    p.appendChild(h('div', {style:{fontSize:'8px',color:'#c8d8e8',textAlign:'center',padding:'16px 0'}},
      '◌ Awaiting Gann data…'));
    return p;
  }

  const sig = gann.signal||{}, son = gann.squareOfNine||{}, cycles = (gann.timeCycles||[]).slice(0,4);
  const gBias = sig.bias||'NEUTRAL', gc = gannPal(gBias);
  p.style.borderColor = gc.border.replace('0.2','0.35');

  const head = h('div', {class:'gann-head', style:{background:gc.bg, borderColor:gc.border}});
  const ringWrap = h('div', {style:{position:'relative',width:'48px',height:'48px',flexShrink:'0'}});
  ringWrap.appendChild(gannRing(sig.score||0, gc.color));
  ringWrap.appendChild(h('span', {style:{
    position:'absolute',top:'50%',left:'50%',transform:'translate(-50%,-50%)',
    fontSize:'14px',fontWeight:'700',color:gc.color,lineHeight:'1'
  }}, sig.score!=null?String(Math.round(sig.score)):'—'));
  head.appendChild(ringWrap);

  const hBody = h('div', {class:'gann-head-body'});
  hBody.appendChild(h('span', {class:'gann-bias-label', style:{color:gc.color}}, gBias.replace(/_/g,' ')));
  if(sig.summary) hBody.appendChild(h('span', {class:'gann-summary'},
    sig.summary.replace(/^Gann: [A-Z]+ \(score \d+\/100\)\.\s?/,'')));
  head.appendChild(hBody);
  p.appendChild(head);

  // Key levels
  const levels = gann.keyLevels||{};
  if((levels.supports?.length||0)+(levels.resistances?.length||0) > 0) {
    const lg = h('div', {class:'gann-levels'});
    const supp = h('div', {class:'gann-level-card', style:{borderColor:'rgba(0,255,156,.15)'}});
    supp.appendChild(h('span', {class:'gann-level-head'}, 'SUPPORTS'));
    (levels.supports||[]).slice(0,3).forEach((s,i) => {
      supp.appendChild(h('div', {class:'gann-level-row'},
        h('span', {style:{color:'#00ff9c'}}, `S${i+1} ${fmtI(s.price)}`),
        h('span', {style:{color:'#5a90a8',fontSize:'7px'}},
          s.source?.includes('Nine')?'SoN':s.source?.includes('Cardinal')?'Card':'—')
      ));
    });
    const res = h('div', {class:'gann-level-card', style:{borderColor:'rgba(239,83,80,.15)'}});
    res.appendChild(h('span', {class:'gann-level-head'}, 'RESISTANCES'));
    (levels.resistances||[]).slice(0,3).forEach((r2,i) => {
      res.appendChild(h('div', {class:'gann-level-row'},
        h('span', {style:{color:'#ef5350'}}, `R${i+1} ${fmtI(r2.price)}`),
        h('span', {style:{color:'#5a90a8',fontSize:'7px'}},
          r2.source?.includes('Nine')?'SoN':r2.source?.includes('Cardinal')?'Card':'—')
      ));
    });
    lg.appendChild(supp); lg.appendChild(res);
    p.appendChild(lg);
  }

  // Square of Nine
  if(son?.positionOnSquare) {
    const sq = h('div', {class:'son-wrap'});
    sq.appendChild(h('div', {class:'sub-title', style:{marginTop:'0'}}, 'Square of Nine'));
    const row = h('div', {class:'son-row'});
    row.appendChild(h('span', {class:'son-angle'}, `${son.angleOnSquare?.toFixed(1)||'—'}° on square`));
    const sc = son.positionOnSquare.strength;
    const sc_color = sc==='EXTREME'?'#ef5350':sc==='STRONG'?'#ffd54f':'#4a9abb';
    row.appendChild(h('span', {class:'son-strength', style:{
      background:sc_color+'15', color:sc_color, borderRadius:'2px', border:`1px solid ${sc_color}33`
    }}, sc));
    sq.appendChild(row);
    sq.appendChild(h('span', {class:'son-label'}, son.positionOnSquare.label));
    p.appendChild(sq);
  }

  // Time cycles
  if(cycles.length>0) {
    p.appendChild(h('div', {class:'sub-title'}, 'Time Cycles'));
    cycles.forEach(c => {
      const timingStr = c.daysFromToday===0?'TODAY':c.daysFromToday<0?`${Math.abs(c.daysFromToday)}d ago`:`+${c.daysFromToday}d`;
      p.appendChild(h('div', {class:'cycle-row'},
        h('span', {class:'cycle-label', style:{color:cycColor[c.cycleStrength]||'#4a9abb'}}, c.label),
        h('span', {class:'cycle-timing', style:{color:proxColor[c.proximity]||'#4a9abb'}}, timingStr)
      ));
    });
  }

  // HIGH alerts
  const gAlerts = (gann.alerts||[]).filter(a=>a.priority==='HIGH').slice(0,2);
  if(gAlerts.length>0) {
    p.appendChild(h('div', {class:'sub-title', style:{borderColor:'rgba(239,83,80,.25)'}}, 'HIGH PRIORITY'));
    gAlerts.forEach(a => p.appendChild(h('div', {class:'gann-alert'}, a.message)));
  }

  if(gann.headline) p.appendChild(h('div', {class:'gann-headline'}, gann.headline));

  return p;
}

// ═══════════════════════════════════════════════════════════════════════════
//  STRUCTURE PANEL
// ═══════════════════════════════════════════════════════════════════════════
function renderStructure(d, gann) {
  const st = d.structure, g = d.gex, oi = d.oi, spot = d.spot;
  const cw = g.callWall, pw = g.putWall, gf = g.gammaFlip;
  let rangePct = null;
  if(cw&&pw&&spot) rangePct = Math.max(0,Math.min(100,Math.round(((spot-pw)/(cw-pw))*100)));

  let zoneLabel, zoneColor;
  if(cw&&spot>=cw*.99)       { zoneLabel='At Call Wall — resistance'; zoneColor='#4fc3f7'; }
  else if(pw&&spot<=pw*1.01) { zoneLabel='At Put Wall — support';     zoneColor='#ff8a65'; }
  else if(gf&&spot>=gf)      { zoneLabel='Above Gamma Flip — trend';  zoneColor='#00ff9c'; }
  else if(gf&&spot<gf)       { zoneLabel='Below Gamma Flip — MR';     zoneColor='#ffd54f'; }
  else if(spot>0)             { zoneLabel='Between walls';              zoneColor='#4a9abb'; }
  else                        { zoneLabel='Awaiting data';              zoneColor='#4a7090'; }

  const p = h('div', {class:'panel'});

  // Gann box at top
  if(gann) {
    const gc = gannPal(gann.signal?.bias||'NEUTRAL');
    const gbx = h('div', {style:{
      background:gc.bg, border:`1px solid ${gc.border}`,
      borderRadius:'5px', padding:'6px 10px', marginBottom:'7px',
      display:'flex', flexDirection:'column', gap:'3px'
    }});
    gbx.appendChild(h('span', {style:{fontSize:'7px',color:'#1a5070',letterSpacing:'1px'}}, 'GANN'));
    const biasRow = h('div', {style:{display:'flex',alignItems:'center',gap:'5px'}});
    biasRow.appendChild(h('span', {style:{fontSize:'11px',fontWeight:'700',color:gc.color}},
      '📐 '+(gann.signal?.bias||'NEUTRAL').replace(/_/g,' ')));
    if(gann.squareOfNine?.angleOnSquare!=null)
      biasRow.appendChild(h('span', {style:{fontSize:'9px',opacity:'.6',color:gc.color}},
        gann.squareOfNine.angleOnSquare.toFixed(1)+'°'));
    gbx.appendChild(biasRow);
    if(gann.keyLevels?.supports?.[0]||gann.keyLevels?.resistances?.[0]) {
      const lvRow = h('div', {style:{display:'flex',gap:'10px',fontSize:'9px'}});
      if(gann.keyLevels.supports?.[0]) lvRow.appendChild(h('span',{style:{color:'#00ff9c'}},'S '+fmtI(gann.keyLevels.supports[0].price)));
      if(gann.keyLevels.resistances?.[0]) lvRow.appendChild(h('span',{style:{color:'#ef5350'}},'R '+fmtI(gann.keyLevels.resistances[0].price)));
      gbx.appendChild(lvRow);
    }
    p.appendChild(gbx);
  }

  p.appendChild(h('div', {class:'panel-title'}, '≡ Market Structure'));

  p.appendChild(h('div', {class:'zone-badge', style:{color:zoneColor, background:zoneColor+'11', borderColor:zoneColor+'33'}},
    h('div', {class:'zone-dot', style:{background:zoneColor}}),
    zoneLabel
  ));

  if(spot>0) p.appendChild(h('span', {style:{fontSize:'12px',fontWeight:'700',color:'#e8f2ff',marginBottom:'4px',display:'block'}},
    '₹'+fmtI(spot)));

  // Range bar
  if(rangePct!==null) {
    const wrap = h('div', {class:'range-bar-wrap'});
    wrap.appendChild(h('div', {class:'range-bar-labels'},
      h('span',{}, 'PUT '+fmtI(pw)),
      h('span',{style:{color:'#e8f2ff'}}, rangePct+'% in range'),
      h('span',{}, 'CALL '+fmtI(cw))
    ));
    const rbg = h('div', {class:'range-bar-bg'});
    rbg.appendChild(h('div', {class:'range-bar-fill', style:{width:rangePct+'%'}}));
    rbg.appendChild(h('div', {class:'range-bar-needle', style:{left:rangePct+'%'}}));
    wrap.appendChild(rbg);
    p.appendChild(wrap);
  }

  // Mini grid
  const mg = h('div', {class:'mini-grid', style:{marginBottom:'8px'}});
  function mc(label, val, sub, color) {
    return h('div', {class:'mini-card'},
      h('span', {class:'mini-card-label'}, label),
      h('span', {class:'mini-card-val', style:{color:color||'#e8f2ff'}}, String(val)),
      sub ? h('span', {class:'mini-card-sub'}, sub) : null
    );
  }
  mg.appendChild(mc('SUPPORT (OI)',  st.supportFromOI ?fmtI(st.supportFromOI) :'—', 'put OI wall',  '#00ff9c'));
  mg.appendChild(mc('RESIST (OI)',   st.resistanceFromOI?fmtI(st.resistanceFromOI):'—', 'call OI wall', '#ef5350'));
  if(gann?.keyLevels) {
    mg.appendChild(mc('SUPPORT (GANN)',   gann.keyLevels.supports?.[0]?.price?fmtI(gann.keyLevels.supports[0].price):'—',
      gann.keyLevels.supports?.[0]?.source||'SoN', '#00ff9c'));
    mg.appendChild(mc('RESIST (GANN)',    gann.keyLevels.resistances?.[0]?.price?fmtI(gann.keyLevels.resistances[0].price):'—',
      gann.keyLevels.resistances?.[0]?.source||'SoN', '#ef5350'));
  }
  p.appendChild(mg);

  // Levels table
  function lvRow(label, val, color) {
    p.appendChild(h('div', {class:'lvl-row'},
      h('span', {class:'lvl-label'}, label),
      h('span', {class:'lvl-val', style:{color}}, val)
    ));
  }
  if(cw&&spot) { const d2=calcP(cw,spot); lvRow('↑ Call Wall', `+${Math.abs(d2).toFixed(1)}% ₹${fmtI(cw-spot)}`, '#4fc3f7'); }
  if(pw&&spot) { const d2=calcP(spot,pw); lvRow('↓ Put Wall', `-${Math.abs(d2).toFixed(1)}% ₹${fmtI(spot-pw)}`, '#ff8a65'); }
  if(gf&&spot) { const abv=spot>gf, d2=calcP(gf,spot); lvRow('γ Flip', (abv?'+':'-')+Math.abs(d2).toFixed(1)+'% ₹'+fmtI(gf), abv?'#00ff9c':'#ffd54f'); }
  if(oi.maxPain) lvRow('⊗ Max Pain', '₹'+fmtI(oi.maxPain), '#a8c8e0');
  if(oi.pcr>0) {
    lvRow('⊕ PCR', oi.pcr.toFixed(2)+' — '+(oi.pcr>1.2?'bullish':oi.pcr<0.8?'bearish':'neutral'),
      oi.pcr>1.2?'#00ff9c':oi.pcr<0.8?'#ef5350':'#ffd54f');
  }

  if(st.ivEnvironment) {
    p.appendChild(h('div', {style:{fontSize:'7.5px',color:'#a0b8cc',marginTop:'6px'}},
      'IV env: ', h('span', {style:{color:'#ffd54f'}}, st.ivEnvironment.replace(/_/g,' '))
    ));
  }
  if(st.straddlePrice>0) {
    const sr = h('div', {style:{display:'flex',justifyContent:'space-between',fontSize:'9px',
      padding:'5px 0',borderTop:'1px solid #1a3040',marginTop:'6px'}});
    sr.appendChild(h('span', {style:{color:'#c8d8e8'}}, 'ATM Straddle'));
    sr.appendChild(h('span', {style:{color:'#e8f2ff',fontWeight:'700'}}, '₹'+fmt2(st.straddlePrice)));
    p.appendChild(sr);
  }

  return p;
}

// ═══════════════════════════════════════════════════════════════════════════
//  MAIN RENDER
// ═══════════════════════════════════════════════════════════════════════════
function render() {
  const d    = STATE[active];
  const gann = GANN_STATE[active];

  renderToolbar();
  renderScoreCard();

  const panels = document.getElementById('panels');
  panels.innerHTML = '';
  panels.appendChild(renderGEX(d));
  panels.appendChild(renderOI(d));
  panels.appendChild(renderGann(gann));
  panels.appendChild(renderStructure(d, gann));
}

// Initial render (empty state — will be filled by socket events)
render();
</script>

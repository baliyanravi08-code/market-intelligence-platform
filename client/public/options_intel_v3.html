<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Options Intel v4</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg0:#010b15;--bg1:#040f1a;--bg2:#060f1e;--bg3:#0a1828;--bg4:#0d2035;
  --border:#1a3548;--border2:#243f58;
  --t1:#e8f2ff;--t2:#c8d8e8;--t3:#8aacc2;--t4:#4a7090;
  --cyan:#00cfff;--green:#00ff9c;--red:#ef5350;--amber:#ffd54f;
  --blue:#4fc3f7;--purple:#d090ff;--orange:#ff8a65;--pink:#ff5cff;
  --scanline:rgba(0,207,255,0.018);
}
html,body{height:100%;background:var(--bg0);overflow:hidden}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;
  background:repeating-linear-gradient(0deg,transparent,transparent 1px,var(--scanline) 1px,var(--scanline) 2px);
}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:var(--bg1)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes barIn{from{width:0}to{width:var(--w)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:translateY(0)}}
@keyframes tickScroll{from{transform:translateX(0)}to{transform:translateX(-50%)}}
@keyframes alertScroll{from{transform:translateX(0)}to{transform:translateX(-50%)}}

/* ─── APP SHELL ─────────────────────────────────────── */
#app{
  display:flex;flex-direction:column;height:100vh;overflow:hidden;
  font-family:'IBM Plex Mono',monospace;color:var(--t1);background:var(--bg0);
  animation:fadeIn .3s ease;
}

/* ─── TOPBAR ─────────────────────────────────────────── */
#topbar{
  height:38px;background:#000;border-bottom:1px solid var(--border);
  display:flex;align-items:stretch;flex-shrink:0;
}
.tb-logo{
  padding:0 14px;font-size:12px;font-weight:700;letter-spacing:2px;
  color:var(--cyan);border-right:1px solid var(--border);
  display:flex;align-items:center;flex-shrink:0;
  text-shadow:0 0 8px var(--cyan);
}
.sym-btn{
  padding:0 13px;font-size:11px;font-weight:700;letter-spacing:.5px;
  background:transparent;border:none;border-right:1px solid var(--border);
  color:var(--t4);cursor:pointer;font-family:'IBM Plex Mono',monospace;
  transition:all .15s;flex-shrink:0;
}
.sym-btn:hover{background:rgba(0,207,255,.05);color:var(--t2)}
.sym-btn.active{background:rgba(0,207,255,.1);color:var(--cyan);border-bottom:2px solid var(--cyan)}
.tb-spacer{flex:1}

/* Alert ticker */
.alert-strip{
  display:flex;align-items:center;border-left:1px solid var(--border);
  max-width:560px;overflow:hidden;flex-shrink:0;
}
.alert-strip-label{
  padding:0 10px;font-size:11px;font-weight:700;letter-spacing:1px;
  color:var(--amber);white-space:nowrap;border-right:1px solid var(--border);flex-shrink:0;
}
.alert-count{
  font-size:10px;padding:2px 5px;border-radius:2px;
  background:rgba(239,83,80,.18);color:var(--red);font-weight:700;
  margin:0 7px;flex-shrink:0;
}
.alert-scroll-track{flex:1;overflow:hidden;position:relative}
.alert-scroll-inner{
  display:inline-flex;gap:30px;white-space:nowrap;
  animation:alertScroll 22s linear infinite;align-items:center;
  padding:0 4px;
}
.alert-scroll-inner:hover{animation-play-state:paused}
.alert-item{
  display:inline-flex;align-items:center;gap:5px;
  font-size:11px;color:var(--amber);
}
.alert-item .dot{
  width:5px;height:5px;border-radius:50%;background:var(--red);flex-shrink:0;
}
.alert-item.high{animation:pulse 1.4s infinite;color:var(--red)}
.alert-pause-btn{
  padding:0 8px;font-size:11px;background:transparent;border:none;border-left:1px solid var(--border);
  color:var(--t4);cursor:pointer;font-family:monospace;flex-shrink:0;height:100%;
}
.alert-pause-btn:hover{color:var(--t2)}
.tb-live{
  padding:0 12px;font-size:11px;display:flex;align-items:center;gap:6px;
  color:var(--t4);border-left:1px solid var(--border);flex-shrink:0;
}
.live-dot{
  width:6px;height:6px;border-radius:50%;background:var(--green);
  animation:pulse 1.5s infinite;box-shadow:0 0 6px var(--green);flex-shrink:0;
}

/* ─── TICKER BAR ─────────────────────────────────────── */
#ticker{
  height:28px;background:#010d18;border-bottom:1px solid var(--border);
  overflow:hidden;display:flex;align-items:center;flex-shrink:0;
}
.ticker-inner{
  display:inline-flex;align-items:center;gap:24px;
  animation:tickScroll 36s linear infinite;padding:0 12px;
}
.ticker-inner:hover{animation-play-state:paused}
.ti{display:inline-flex;align-items:center;gap:6px;font-size:11px}
.ti-name{color:var(--cyan);font-weight:700}
.ti-price{color:var(--t1);font-weight:700}
.ti-chg{font-size:11px}
.ti-chg.up{color:var(--green)}
.ti-chg.dn{color:var(--red)}
.ti-sep{color:var(--border2);font-size:13px}

/* ─── ISK ROW (Score + Greeks) ───────────────────────── */
#iskrow{
  height:70px;background:var(--bg2);border-bottom:1px solid var(--border);
  display:flex;align-items:stretch;flex-shrink:0;overflow:hidden;
}
.isk-score{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:0 16px;border-right:1px solid var(--border);min-width:80px;flex-shrink:0;
}
.isk-num{font-size:32px;font-weight:700;line-height:1}
.isk-lbl{font-size:10px;font-weight:700;letter-spacing:1px;margin-top:3px}
.isk-sym{
  display:flex;flex-direction:column;justify-content:center;
  padding:0 14px;border-right:1px solid var(--border);min-width:190px;flex-shrink:0;
}
.isk-sym-row{display:flex;align-items:center;gap:6px;margin-bottom:5px}
.isk-sym-name{font-size:14px;font-weight:700;color:var(--t1)}
.isk-bias{font-size:11px;font-weight:700}
.badge{
  font-size:10px;font-weight:700;padding:2px 6px;border-radius:2px;
  border:1px solid;white-space:nowrap;letter-spacing:.3px;
}
.isk-strats{display:flex;gap:4px;flex-wrap:nowrap;overflow:hidden}
.isk-stats{
  display:flex;align-items:stretch;flex:1;overflow:hidden;
}
.istat{
  display:flex;flex-direction:column;justify-content:center;
  padding:0 10px;border-right:1px solid var(--border);min-width:62px;flex-shrink:0;
}
.istat-l{font-size:10px;color:var(--t3);letter-spacing:.7px;text-transform:uppercase;margin-bottom:2px;white-space:nowrap}
.istat-v{font-size:13px;font-weight:700;line-height:1.1}
.istat-s{font-size:9px;color:var(--t3);margin-top:1px}
.ivrank-wrap{
  display:flex;flex-direction:column;justify-content:center;
  padding:0 10px;min-width:90px;flex-shrink:0;border-right:1px solid var(--border);
}
.ivr-row{display:flex;justify-content:space-between;font-size:10px;margin-bottom:3px}
.ivr-track{height:4px;background:var(--bg4);border-radius:2px;overflow:hidden}
.ivr-fill{height:4px;border-radius:2px}
.ivr-pct{font-size:9px;color:var(--t3);margin-top:2px}
.trend-block{
  display:flex;align-items:center;padding:0 12px;flex-shrink:0;
  border-left:none;
}
.trend-text{font-size:11px;font-weight:700;line-height:1.4}

/* ─── 4-PANEL GRID ───────────────────────────────────── */
#panels{
  flex:1;display:grid;grid-template-columns:repeat(4,minmax(0,1fr));
  gap:0;min-height:0;overflow:hidden;
}
.panel{
  background:var(--bg1);border-right:1px solid var(--border);
  display:flex;flex-direction:column;min-height:0;overflow:hidden;
  animation:fadeIn .25s ease;
}
.panel:last-child{border-right:none}

/* Panel header */
.ph{
  height:28px;background:#000;border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 10px;gap:8px;flex-shrink:0;
}
.ph-title{
  font-size:11px;font-weight:700;letter-spacing:1.2px;
  text-transform:uppercase;color:var(--t3);
}
.ph-badge{
  font-size:10px;font-weight:700;padding:2px 6px;border-radius:2px;border:1px solid;
}
.ph-spacer{flex:1}

/* Panel body */
.pbody{
  flex:1;overflow-y:auto;padding:8px 10px;
  display:flex;flex-direction:column;gap:0;
}
.pbody::-webkit-scrollbar{width:2px}

/* Section heading inside panel */
.sec-hdr{
  font-size:10px;font-weight:700;color:var(--t3);letter-spacing:1px;
  text-transform:uppercase;border-top:1px solid var(--border);
  border-bottom:1px solid var(--border);padding:3px 0;margin:7px 0 5px;
  flex-shrink:0;
}

/* Mini card grid */
.mini-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-bottom:6px}
.mc{background:var(--bg3);border:1px solid var(--border);border-radius:3px;padding:5px 8px}
.mc-l{font-size:10px;color:var(--t2);letter-spacing:.8px;display:block;margin-bottom:2px}
.mc-v{font-size:13px;font-weight:700;display:block;line-height:1.1;word-break:break-word}
.mc-s{font-size:9px;color:var(--t3);display:block;margin-top:2px}

/* ─── GEX PANEL ──────────────────────────────────────── */
.gex-bar{margin-bottom:6px}
.gex-bar-hd{display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px}
.gex-track{height:5px;background:var(--bg4);border-radius:2px;overflow:hidden}
.gex-fill{
  height:5px;border-radius:2px;
  --w:0%;width:var(--w);
  animation:barIn .6s cubic-bezier(.4,0,.2,1) forwards;
}
.regime-tag{
  display:inline-flex;align-items:center;gap:5px;
  padding:3px 8px;border-radius:2px;font-size:10px;font-weight:700;
  border:1px solid;margin:5px 0 7px;
}
.gex-strike{
  display:flex;align-items:center;gap:5px;
  font-size:11px;padding:3px 0;border-bottom:1px solid rgba(26,53,72,.5);
}
.gex-s-lbl{width:54px;color:var(--t2);flex-shrink:0}
.gex-s-track{flex:1;height:4px;background:var(--bg4);border-radius:2px;overflow:hidden}
.gex-s-fill{height:4px;border-radius:2px;--w:0%;width:var(--w);animation:barIn .5s ease forwards}
.gex-s-val{width:58px;text-align:right;font-size:10px;font-weight:700}

/* ─── OI PANEL ───────────────────────────────────────── */
.oi-tabs{display:flex;gap:0;margin-bottom:6px;border:1px solid var(--border);border-radius:3px;overflow:hidden}
.oi-tab{
  flex:1;font-size:10px;font-weight:700;letter-spacing:.4px;
  padding:4px 2px;border-radius:0;cursor:pointer;border:none;
  background:transparent;color:var(--t4);transition:all .15s;
  font-family:'IBM Plex Mono',monospace;
}
.oi-tab.active-near{background:rgba(79,195,247,.1);color:var(--blue)}
.oi-tab.active-tail{background:rgba(208,144,255,.1);color:var(--purple)}
.oi-hdr{
  display:grid;grid-template-columns:30px 58px 1fr 1fr 46px;
  gap:2px;font-size:10px;color:var(--t4);letter-spacing:.5px;
  padding:2px 2px 4px;border-bottom:1px solid var(--border);margin-bottom:3px;
}
.oi-row{
  display:grid;grid-template-columns:30px 58px 1fr 1fr 46px;
  gap:2px;padding:3px 2px;border-radius:2px;align-items:center;
  transition:background .1s;
}
.oi-row:nth-child(even){background:rgba(6,15,28,.6)}
.oi-row:hover{background:var(--bg4)}
.oi-type{
  font-size:10px;font-weight:700;padding:1px 2px;border-radius:2px;
  border:1px solid;text-align:center;
}
.oi-strike{font-size:11px;font-weight:700;color:var(--t1)}
.oi-oi{font-size:10px;color:var(--t2);text-align:right}
.oi-vol{font-size:10px;color:var(--pink);text-align:right}
.oi-dist{font-size:10px;font-weight:700;text-align:right}
.oi-pgn{
  display:flex;align-items:center;justify-content:space-between;
  padding-top:5px;border-top:1px solid var(--border);margin-top:5px;flex-shrink:0;
}
.pgn-info{font-size:10px;color:var(--t4)}
.pgn-btns{display:flex;gap:4px}
.pgn-btn{
  font-size:11px;padding:2px 8px;border-radius:2px;
  border:1px solid var(--border);background:transparent;
  color:var(--t4);cursor:pointer;font-family:'IBM Plex Mono',monospace;
  transition:all .1s;
}
.pgn-btn:not(:disabled):hover{background:var(--bg4);color:var(--t2);border-color:var(--border2)}
.pgn-btn:disabled{opacity:.3;cursor:default}

/* ─── GANN PANEL ─────────────────────────────────────── */
.gann-status{
  display:flex;align-items:center;gap:6px;
  padding:4px 8px;border-radius:3px;border:1px solid;
  margin-bottom:7px;font-size:10px;
}
.gann-status-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.gann-tabs{display:flex;gap:0;margin-bottom:7px;border:1px solid var(--border);border-radius:3px;overflow:hidden}
.gann-tab{
  flex:1;font-size:10px;font-weight:700;letter-spacing:.4px;
  padding:4px 2px;cursor:pointer;border:none;
  background:transparent;color:var(--t4);transition:all .15s;
  font-family:'IBM Plex Mono',monospace;
}
.gann-tab.active{background:#1a2a4a;color:var(--blue)}
.gann-sig-card{
  border-radius:3px;padding:7px 9px;border:1px solid;margin-bottom:7px;
}
.gann-sig-row{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.gann-sig-icon{font-size:15px;line-height:1}
.gann-sig-label{font-size:13px;font-weight:700;letter-spacing:.3px}
.gann-sig-str{font-size:11px;font-weight:700;margin-left:auto}
.str-bar-bg{height:4px;background:#ffffff10;border-radius:2px;margin-bottom:5px}
.str-bar-fill{height:4px;border-radius:2px;--w:50%;width:var(--w);animation:barIn .6s ease forwards}
.gann-rationale{font-size:10px;color:var(--t3);line-height:1.5}
.gann-day-stats{display:flex;gap:4px;margin-bottom:7px}
.gds{
  flex:1;background:var(--bg3);border:1px solid var(--border);
  border-radius:3px;padding:4px 6px;
  display:flex;flex-direction:column;gap:2px;
}
.gds-l{font-size:9px;color:var(--t4);letter-spacing:.8px;text-transform:uppercase}
.gds-v{font-size:11px;font-weight:700}
.gann-fan-wrap{
  background:#050a12;border-radius:3px;border:1px solid #0e1828;
  overflow:hidden;margin-bottom:7px;
}
.gann-fan-frozen{
  text-align:center;padding:4px 0;font-size:10px;
  color:var(--t4);border-top:1px solid #0e1828;
}
.fan-legend{display:flex;flex-wrap:wrap;gap:6px;padding:3px 0 4px}
.fan-leg-item{display:flex;align-items:center;gap:3px;font-size:9px;color:var(--t4)}
.fan-leg-line{width:12px;height:2px;border-radius:1px}
.sq9-grid{display:grid;grid-template-columns:1fr 1fr;gap:3px}
.sq9-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:3px 6px;border-radius:2px;
}
.sq9-lbl{font-size:10px;color:var(--t4)}
.sq9-val{font-size:11px;font-weight:700;font-family:'IBM Plex Mono',monospace}
.sq9-dist{font-size:10px;color:var(--t4)}
.gann-sr-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:6px}
.gann-sr-col{background:var(--bg3);border:1px solid var(--border);border-radius:3px;padding:5px 7px}
.gann-sr-hdr{font-size:10px;color:var(--t3);letter-spacing:.8px;text-transform:uppercase;margin-bottom:4px}
.gann-sr-row{display:flex;justify-content:space-between;font-size:11px;padding:2px 0}
.gann-log-row{
  display:flex;align-items:center;gap:6px;
  padding:3px 0;border-bottom:1px solid #0e1828;font-size:10px;
}
.gann-log-row:last-child{border:none}

/* ─── STRUCTURE PANEL ────────────────────────────────── */
.zone-badge{
  display:inline-flex;align-items:center;gap:6px;
  padding:4px 9px;border-radius:3px;margin-bottom:6px;
  border:1px solid;font-size:11px;font-weight:700;
}
.zone-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.range-wrap{margin-bottom:7px}
.range-lbls{
  display:flex;justify-content:space-between;
  font-size:10px;color:var(--t4);margin-bottom:3px;
}
.range-track{
  height:6px;background:var(--bg4);border-radius:3px;
  position:relative;overflow:visible;
}
.range-fill{
  height:6px;border-radius:3px;
  background:linear-gradient(90deg,rgba(255,138,101,.4),rgba(255,213,79,.4));
  transition:width .5s ease;
}
.range-needle{
  position:absolute;top:-2px;width:2px;height:10px;
  background:var(--t1);border-radius:1px;transform:translateX(-50%);
  transition:left .4s ease;
}
.lvl-row{
  display:flex;justify-content:space-between;
  padding:4px 0;border-bottom:1px solid var(--border);font-size:11px;
}
.lvl-lbl{color:var(--t2)}
.lvl-val{font-weight:700}
.straddle-row{
  display:flex;justify-content:space-between;
  font-size:12px;padding:5px 0;
  border-top:1px solid var(--border);margin-top:5px;
}
</style>
</head>
<body>
<div id="app">
  <div id="topbar"></div>
  <div id="ticker"></div>
  <div id="iskrow"></div>
  <div id="panels"></div>
</div>

<script>
// ─── SOCKET.IO loader ─────────────────────────────────────────────────────
(function(){
  const s=document.createElement('script');
  s.src='/socket.io/socket.io.js';
  s.onload=()=>window._socketIOReady&&window._socketIOReady();
  s.onerror=()=>{window._socketOffline=true;window._socketIOReady&&window._socketIOReady()};
  document.head.appendChild(s);
})();

// ═══════════════════════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════════════════════
const SYMBOLS=["NIFTY 50","BANK NIFTY","SENSEX"];
const GANN_FANS=[
  {label:'8x1',ratio:8,color:'#ff4757'},
  {label:'4x1',ratio:4,color:'#ff6b35'},
  {label:'2x1',ratio:2,color:'#ffa502'},
  {label:'1x1',ratio:1,color:'#ffffff'},
  {label:'1x2',ratio:.5,color:'#70a1ff'},
  {label:'1x4',ratio:.25,color:'#5352ed'},
  {label:'1x8',ratio:.125,color:'#2ed573'},
];

function _mkState(sym){
  return{
    symbol:sym,score:50,bias:'NEUTRAL',spot:0,ltp:0,strategy:[],
    volatility:{atmIV:0,hv20:0,hv60:0,vrp:0,ivRank:50,ivPercentile:50,skew25:0,skewSentiment:'NEUTRAL'},
    atmGreeks:{delta:0.5,gamma:0,theta:0,vega:0,rho:0,lambda:0},
    gex:{netGEX:0,callGEX:0,putGEX:0,callWall:null,putWall:null,gammaFlip:null,regime:'MEAN_REVERTING',topStrikes:[]},
    dealerExposures:{dex:0,vex:0,chex:0},
    oi:{pcr:1,maxPain:null,totalCallOI:0,totalPutOI:0,netPremiumFlow:0,premiumBias:'NEUTRAL',unusualOI:[],unusualOITailRisk:[]},
    structure:{straddlePrice:0,expectedMoveAbs:0,expectedMovePct:0,vrp:0,ivEnvironment:'NORMAL',eventRiskScore:0,supportFromOI:null,resistanceFromOI:null},
  };
}
function _mkGann(sym){
  return{
    symbol:sym,ltp:0,dayLow:0,dayHigh:0,dayOpen:0,
    barsFromLow:0,barsFromHigh:0,
    signal:null,strength:0,rationale:'',
    sq9Levels:[],fanFromLow:[],fanFromHigh:[],aboveFan:null,
    frozen:false,frozenAt:null,marketOpen:false,
    status:'no_data',signalLog:[],tab:'fan',
  };
}

const STATE={};
const GANN={};
const spotHistory={};
SYMBOLS.forEach(s=>{STATE[s]=_mkState(s);GANN[s]=_mkGann(s);spotHistory[s]=[]});

let active='NIFTY 50';
let oiView='near';
let oiScroll=0;
const OI_ROWS=7;
let alerts=[];
const MAX_ALERTS=20;
let isConnected=false;

// ─── IST / Market hours ───────────────────────────────────────────────────
function getIST(){return new Date(new Date().toLocaleString('en-US',{timeZone:'Asia/Kolkata'}))}
function mktStatus(){
  const d=getIST(),day=d.getDay(),m=d.getHours()*60+d.getMinutes();
  if(day===0||day===6)return'weekend';
  if(m<555)return'pre';
  if(m<=930)return'open';
  return'closed';
}

// ─── Gann math ────────────────────────────────────────────────────────────
function computeSq9(price,steps=5){
  const root=Math.sqrt(price),out=[];
  for(let i=-steps;i<=steps;i++){
    if(i===0)continue;
    const lvl=Math.pow(root+i*0.125,2);
    if(lvl>0)out.push({level:Math.round(lvl*10)/10,rotation:i,label:i>0?`+${i}/8`:`${i}/8`,dir:i>0?'R':'S'});
  }
  return out;
}
function computeGannSignal(ltp,dayLow,dayHigh,barsFromLow,barsFromHigh){
  if(!ltp||!dayLow||!dayHigh)return{signal:'NEUTRAL',strength:40,rationale:'Awaiting data',aboveFan:null};
  const fanValsL=GANN_FANS.map(f=>({...f,proj:dayLow+f.ratio*barsFromLow}));
  const fanValsH=GANN_FANS.map(f=>({...f,proj:dayHigh-f.ratio*barsFromHigh}));
  const above1x1=ltp>fanValsL.find(f=>f.label==='1x1').proj;
  const below1x1H=ltp<fanValsH.find(f=>f.label==='1x1').proj;
  let signal='NEUTRAL',strength=40,rationale='',aboveFan=null;
  if(above1x1){
    const candidates=fanValsL.filter(f=>f.proj<=ltp).sort((a,b)=>b.ratio-a.ratio);
    const top=candidates[0];aboveFan=top?.label;
    if(top?.ratio>=4){signal='STRONG LONG';strength=88}
    else if(top?.ratio>=2){signal='LONG';strength=72}
    else{signal='WEAK LONG';strength=55}
    rationale=`Above ${top?.label||'1x1'} fan from low (${dayLow?.toFixed(0)})`;
  }else if(below1x1H){
    const candidates=fanValsH.filter(f=>f.proj>=ltp).sort((a,b)=>a.ratio-b.ratio);
    const top=candidates[0];
    if(top?.ratio>=4){signal='STRONG SHORT';strength=88}
    else if(top?.ratio>=2){signal='SHORT';strength=72}
    else{signal='WEAK SHORT';strength=55}
    rationale=`Below ${top?.label||'1x1'} fan from high (${dayHigh?.toFixed(0)})`;
  }else{
    rationale='Price between 1×1 lines — neutral';
  }
  const sq9=computeSq9(ltp,3);
  const nearR=sq9.find(l=>l.dir==='R'&&Math.abs(l.level-ltp)/ltp<0.003);
  const nearS=sq9.find(l=>l.dir==='S'&&Math.abs(l.level-ltp)/ltp<0.003);
  if(nearR){rationale+=` | Near Sq9 R: ${nearR.level}`;strength=Math.max(30,strength-18)}
  if(nearS){rationale+=` | Near Sq9 S: ${nearS.level}`;strength=Math.max(30,strength-18)}
  return{signal,strength,rationale,aboveFan};
}

window._socketIOReady=function(){
  if(window._socketOffline||typeof io==='undefined')return;
  const socket=io({transports:['websocket','polling']});

  socket.on('connect',()=>{isConnected=true;renderTopbar()});
  socket.on('disconnect',()=>{isConnected=false;renderTopbar()});

  socket.on('options-intel',data=>{
    if(!data?.symbol||!STATE[data.symbol])return;
    Object.assign(STATE[data.symbol],data);
    if(data.spot>0){spotHistory[data.symbol].push(data.spot);if(spotHistory[data.symbol].length>24)spotHistory[data.symbol].shift()}
    if(active===data.symbol)render();
  });

  socket.on('gann:update',data=>{
    const sym=_gannMap(data.symbol);if(!sym||!GANN[sym])return;
    const prev=GANN[sym];
    if(data.signal&&data.signal!==prev.signal&&data.strength>=60){
      prev.signalLog=[{signal:data.signal,ltp:data.ltp,str:data.strength,time:data.updatedAt||getIST().toLocaleTimeString('en-IN',{timeZone:'Asia/Kolkata'})},...prev.signalLog].slice(0,5);
    }
    Object.assign(GANN[sym],data,{frozen:false,marketOpen:true,status:'live'});
    if(active===sym)renderPanels();
  });

  socket.on('gann:frozen',data=>{
    const sym=_gannMap(data.symbol);if(!sym||!GANN[sym])return;
    Object.assign(GANN[sym],data,{frozen:true,marketOpen:false,status:'frozen'});
    if(active===sym)renderPanels();
  });

  socket.on('gann:weekend',data=>{
    const sym=_gannMap(data.symbol);if(!sym||!GANN[sym])return;
    Object.assign(GANN[sym],data,{frozen:true,marketOpen:false,status:'frozen'});
    if(active===sym)renderPanels();
  });

  socket.on('gann:signal',data=>{
    const sym=_gannMap(data.symbol);if(!sym||!GANN[sym])return;
    GANN[sym].signalLog=[data,...GANN[sym].signalLog].slice(0,5);
    if(active===sym)renderPanels();
  });

  socket.on('options-alert',alert=>{
    if(!alert?.message)return;
    const dup=alerts.some(a=>a.message===alert.message&&Date.now()-a.ts<60000);
    if(!dup){alerts.unshift({...alert,ts:alert.ts||Date.now()});if(alerts.length>MAX_ALERTS)alerts=alerts.slice(0,MAX_ALERTS);renderTopbar()}
  });

  socket.on('market-tick',updates=>{
    if(!Array.isArray(updates))return;
    let changed=false;
    for(const tick of updates){
      const sym=tick.name;if(!STATE[sym])continue;
      if(tick.raw>0){STATE[sym].spot=tick.raw;STATE[sym].ltp=tick.raw;spotHistory[sym].push(tick.raw);if(spotHistory[sym].length>24)spotHistory[sym].shift();if(sym===active)changed=true;}
    }
    if(changed){renderISKRow();renderTicker()}
  });

  SYMBOLS.forEach(sym=>{
    const gs=_displayToGannSym(sym);
    fetch(`/api/gann/${gs}`).then(r=>r.ok?r.json():null).then(d=>{
      if(d&&GANN[sym]){const prev=GANN[sym];Object.assign(GANN[sym],d);GANN[sym].signalLog=prev.signalLog;if(active===sym)renderPanels()}
    }).catch(()=>{});
  });
};

function _gannMap(s){
  if(!s)return null;
  const u=s.toUpperCase().replace(/\s/g,'');
  if(u==='NIFTY'||u==='NIFTY50')return'NIFTY 50';
  if(u==='BANKNIFTY'||u==='BANKNIFTY50')return'BANK NIFTY';
  if(u==='SENSEX')return'SENSEX';
  return null;
}
function _displayToGannSym(sym){
  if(sym==='NIFTY 50')return'NIFTY';
  if(sym==='BANK NIFTY')return'BANKNIFTY';
  return'SENSEX';
}

// ─── DOM builder ──────────────────────────────────────────────────────────
function h(tag,props={},...children){
  const el=document.createElement(tag);
  for(const[k,v]of Object.entries(props)){
    if(k==='class')el.className=v;
    else if(k==='style'&&typeof v==='object')Object.assign(el.style,v);
    else if(k.startsWith('on'))el.addEventListener(k.slice(2).toLowerCase(),v);
    else el.setAttribute(k,v);
  }
  for(const child of children.flat()){
    if(child==null||child===false)continue;
    el.appendChild(typeof child==='string'||typeof child==='number'
      ?document.createTextNode(String(child)):child);
  }
  return el;
}

// ─── Gann Fan SVG ─────────────────────────────────────────────────────────
function buildGannFanSVG(g){
  const W=260,H=145;
  const{ltp,dayLow,dayHigh,barsFromLow=28,barsFromHigh=15,frozen}=g;
  if(!ltp||!dayLow||!dayHigh){
    return`<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" width="100%" height="${H}">
      <text x="${W/2}" y="${H/2}" fill="#2a4060" font-size="11" text-anchor="middle" font-family="IBM Plex Mono,monospace">Awaiting price data…</text>
    </svg>`;
  }
  const pad=(dayHigh-dayLow)*0.45||ltp*0.02;
  const pMin=dayLow-pad,pMax=dayHigh+pad,pRange=pMax-pMin;
  const totalBars=80,pivotBar=5,currBar=totalBars-6;
  const xS=b=>(b/totalBars)*W;
  const yS=p=>H-((p-pMin)/pRange)*(H-10)-5;
  let svg=`<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" width="100%" height="${H}">`;
  [0.25,0.5,0.75].forEach(f=>{svg+=`<line x1="0" y1="${(H*f).toFixed(1)}" x2="${W}" y2="${(H*f).toFixed(1)}" stroke="#ffffff05" stroke-width="1"/>`});
  GANN_FANS.forEach(fan=>{
    const x1=xS(pivotBar),y1=yS(dayLow),x2=xS(totalBars),y2=yS(dayLow+fan.ratio*(totalBars-pivotBar));
    const sw=fan.label==='1x1'?1.6:0.8;
    const da=fan.label==='1x1'?'':' stroke-dasharray="4,3"';
    svg+=`<line x1="${x1.toFixed(1)}" y1="${y1.toFixed(1)}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}" stroke="${fan.color}" stroke-width="${sw}" opacity="0.75"${da}/>`;
    const ly=Math.max(8,Math.min(H-4,y2));
    svg+=`<text x="${(x2-2).toFixed(1)}" y="${ly.toFixed(1)}" fill="${fan.color}" font-size="9" text-anchor="end" font-family="IBM Plex Mono,monospace" opacity=".8">${fan.label}</text>`;
  });
  GANN_FANS.forEach(fan=>{
    const x1=xS(pivotBar),y1=yS(dayHigh),x2=xS(totalBars),y2=yS(dayHigh-fan.ratio*(totalBars-pivotBar));
    svg+=`<line x1="${x1.toFixed(1)}" y1="${y1.toFixed(1)}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}" stroke="${fan.color}" stroke-width="0.6" opacity="0.25" stroke-dasharray="3,4"/>`;
  });
  const px=xS(pivotBar);
  svg+=`<circle cx="${px.toFixed(1)}" cy="${yS(dayLow).toFixed(1)}" r="3.5" fill="#00ff64" opacity=".9"/>`;
  svg+=`<text x="${(px+5).toFixed(1)}" y="${(yS(dayLow)-3).toFixed(1)}" fill="#00ff64" font-size="9" font-family="IBM Plex Mono,monospace">L${dayLow.toFixed(0)}</text>`;
  svg+=`<circle cx="${px.toFixed(1)}" cy="${yS(dayHigh).toFixed(1)}" r="3.5" fill="#ff4757" opacity=".9"/>`;
  svg+=`<text x="${(px+5).toFixed(1)}" y="${(yS(dayHigh)+11).toFixed(1)}" fill="#ff4757" font-size="9" font-family="IBM Plex Mono,monospace">H${dayHigh.toFixed(0)}</text>`;
  const yLTP=yS(ltp),xLTP=xS(currBar);
  svg+=`<line x1="0" y1="${yLTP.toFixed(1)}" x2="${W}" y2="${yLTP.toFixed(1)}" stroke="#f0c040" stroke-width="1.4" stroke-dasharray="6,3" opacity=".9"/>`;
  if(!frozen){
    svg+=`<circle cx="${xLTP.toFixed(1)}" cy="${yLTP.toFixed(1)}" r="4.5" fill="#f0c040"><animate attributeName="r" values="4.5;6.5;4.5" dur="1.5s" repeatCount="indefinite"/><animate attributeName="opacity" values="1;.5;1" dur="1.5s" repeatCount="indefinite"/></circle>`;
  }else{
    svg+=`<circle cx="${xLTP.toFixed(1)}" cy="${yLTP.toFixed(1)}" r="4.5" fill="#555"/>`;
  }
  svg+=`<rect x="${(xLTP+6).toFixed(1)}" y="${(yLTP-8).toFixed(1)}" width="50" height="15" fill="#050a12" rx="2"/>`;
  svg+=`<text x="${(xLTP+9).toFixed(1)}" y="${(yLTP+3).toFixed(1)}" fill="${frozen?'#555':'#f0c040'}" font-size="11" font-weight="700" font-family="IBM Plex Mono,monospace">${ltp.toFixed(0)}</text>`;
  if(g.signal&&g.signal!=='NEUTRAL'&&!frozen){
    const ss=sigStyle(g.signal);
    svg+=`<text x="${(W/2).toFixed(1)}" y="14" fill="${ss.text}" font-size="11" text-anchor="middle" font-weight="700" font-family="IBM Plex Mono,monospace" opacity=".9">${ss.icon} ${g.signal}</text>`;
  }
  svg+=`</svg>`;
  return svg;
}

  const ivc=ivRank>70?'#ef5350':ivRank>40?'#ffd54f':'#00ff9c';
  ivr.appendChild(h('div',{class:'ivr-row'},
    h('span',{style:{color:'var(--t2)',fontSize:'10px',letterSpacing:'.5px'}},'IV RANK'),
    h('span',{style:{color:ivc,fontWeight:'700',fontSize:'10px'}},fmt2(ivRank))));
  const ivrTrack=h('div',{class:'ivr-track'});
  ivrTrack.appendChild(h('div',{class:'ivr-fill',style:{width:ivRank+'%','--w':ivRank+'%',background:ivc}}));
  ivr.appendChild(ivrTrack);
  if(vol.ivPercentile!=null)ivr.appendChild(h('span',{class:'ivr-pct'},'%ile: '+fmt2(vol.ivPercentile)));
  stats.appendChild(ivr);

  stats.appendChild(vdiv());
  const dc=Math.abs(gr.delta||0)>0.85?'#ffd54f':(gr.delta||0)>0?'#00ff9c':'#ef5350';
  stats.appendChild(istat('DELTA',fmt2(gr.delta),null,dc));
  stats.appendChild(istat('GAMMA',gr.gamma?gr.gamma.toFixed(6):'—',null,'var(--t1)'));
  stats.appendChild(istat('THETA',fmt2(gr.theta),'₹/day','#ff8a65'));
  stats.appendChild(istat('VEGA',fmt2(gr.vega),'1%IV','#4fc3f7'));
  stats.appendChild(istat('LAMBDA',(gr.lambda||gr.leverage)!=null&&(gr.lambda||gr.leverage)!==0?fmt2(gr.lambda||gr.leverage):'—','lev'));
  if(gr.rho!=null)stats.appendChild(istat('RHO',fmt2(gr.rho)));
  row.appendChild(stats);

  const td=tradeDecision(d);
  if(td){
    const tb2=h('div',{class:'trend-block'});
    tb2.appendChild(h('span',{class:'trend-text',style:{color:td.color,background:`${td.color}10`,border:`1px solid ${td.color}30`,padding:'4px 10px',borderRadius:'3px'}},td.icon+' '+td.text));
    row.appendChild(tb2);
  }
}

function tradeDecision(d){
  const spot=d.spot,gex=d.gex,oi=d.oi;
  if(!spot)return null;
  if(gex.gammaFlip&&spot>gex.gammaFlip&&gex.regime==='TREND_AMPLIFYING')return{text:'Trend mode → Buy dips / momentum longs',color:'#00ff9c',icon:'▲'};
  if(gex.gammaFlip&&spot<gex.gammaFlip&&gex.regime==='MEAN_REVERTING')return{text:'Mean reversion → Sell rallies / range plays',color:'#ffd54f',icon:'◆'};
  if(gex.callWall&&spot>=gex.callWall*.995)return{text:'At call wall → Expect pin / sell calls',color:'#4fc3f7',icon:'●'};
  if(gex.putWall&&spot<=gex.putWall*1.005)return{text:'At put wall → Expect bounce / buy dips',color:'#ff8a65',icon:'●'};
  if(oi.pcr&&oi.pcr>1.4)return{text:'PCR extreme → Contrarian buy signals',color:'#00ff9c',icon:'▲'};
  if(oi.pcr&&oi.pcr<0.7)return{text:'PCR low → Market complacent, stay hedged',color:'#ef5350',icon:'▼'};
  return null;
}

function renderGEX(d){
  const g=d.gex,de=d.dealerExposures||{};
  const gexMax=Math.max(Math.abs(g.netGEX||0),Math.abs(g.callGEX||0),Math.abs(g.putGEX||0),1);
  const regimeC=g.regime==='MEAN_REVERTING'?'#00ff9c':'#ef5350';
  const biasText=g.netGEX>0?'Dealers long gamma — stabilized':g.netGEX<0?'Dealers short gamma — volatile, trend-amplifying':'Neutral positioning';
  const p=h('div',{class:'panel'});
  p.appendChild(h('div',{class:'ph'},
    h('span',{class:'ph-title'},'Dealer GEX'),
    h('span',{class:'ph-badge',style:{color:g.netGEX>=0?'#00ff9c':'#ef5350',background:g.netGEX>=0?'rgba(0,255,156,.1)':'rgba(239,83,80,.1)',borderColor:g.netGEX>=0?'rgba(0,255,156,.3)':'rgba(239,83,80,.3)'}},g.regime.replace(/_/g,' '))
  ));
  const body=h('div',{class:'pbody'});

  function gexBar(label,value,color){
    const pct=Math.min(Math.abs((value||0)/(gexMax||1))*100,100).toFixed(1);
    const wr=h('div',{class:'gex-bar'});
    wr.appendChild(h('div',{class:'gex-bar-hd'},h('span',{style:{color:'#c8d8e8'}},label),h('span',{style:{color,fontWeight:'700'}},fmtCr(value))));
    const track=h('div',{class:'gex-track'});
    track.appendChild(h('div',{class:'gex-fill',style:{'--w':pct+'%',width:pct+'%',background:color}}));
    wr.appendChild(track);return wr;
  }
  body.appendChild(gexBar('Net GEX',g.netGEX,g.netGEX>=0?'#00ff9c':'#ef5350'));
  body.appendChild(gexBar('Call GEX',g.callGEX,'#4fc3f7'));
  body.appendChild(gexBar('Put GEX',g.putGEX,'#ff8a65'));
  body.appendChild(h('div',{class:'regime-tag',style:{color:regimeC,background:`${regimeC}10`,borderColor:`${regimeC}33`}},
    h('span',{style:{width:'6px',height:'6px',borderRadius:'50%',background:regimeC,display:'inline-block',flexShrink:'0'}}),
    g.regime.replace(/_/g,' '),' — ',biasText
  ));

  function mc(label,val,sub,color){return h('div',{class:'mc'},h('span',{class:'mc-l'},label),h('span',{class:'mc-v',style:{color:color||'var(--t1)'}},String(val)),sub?h('span',{class:'mc-s'},sub):null)}
  const grid=h('div',{class:'mini-grid'});
  grid.appendChild(mc('GAMMA FLIP',g.gammaFlip?fmtI(g.gammaFlip):'—','spot level','#ffd54f'));
  grid.appendChild(mc('REGIME',(g.regime||'—').replace(/_/g,' '),null,regimeC));
  grid.appendChild(mc('CALL WALL',g.callWall?fmtI(g.callWall):'—','resistance','#4fc3f7'));
  grid.appendChild(mc('PUT WALL',g.putWall?fmtI(g.putWall):'—','support','#ff8a65'));
  body.appendChild(grid);

  const vanna=de.vex??null,charm=de.chex??null;
  if(vanna!=null||charm!=null){
    body.appendChild(h('div',{class:'sec-hdr'},'2nd Order Greeks'));
    const g2=h('div',{class:'mini-grid'});
    if(vanna!=null)g2.appendChild(mc('VANNA',fmtCr(vanna),'Δ vs vol','#ff5cff'));
    if(charm!=null)g2.appendChild(mc('CHARM',fmtCr(charm),'time decay','#ffd54f'));
    body.appendChild(g2);
  }

  if(g.topStrikes?.length>0){
    body.appendChild(h('div',{class:'sec-hdr'},'Top GEX Strikes'));
    const maxStrike=Math.max(...g.topStrikes.map(s=>Math.abs(s.netGEX||0)),1);
    g.topStrikes.slice(0,5).forEach(s=>{
      const pct=Math.min(Math.abs((s.netGEX||0)/maxStrike)*100,100).toFixed(1);
      const sc=(s.netGEX||0)>=0?'#00ff9c':'#ef5350';
      body.appendChild(h('div',{class:'gex-strike'},
        h('span',{class:'gex-s-lbl'},fmtI(s.strike)),
        h('div',{class:'gex-s-track'},h('div',{class:'gex-s-fill',style:{'--w':pct+'%',width:pct+'%',background:sc}})),
        h('span',{class:'gex-s-val',style:{color:sc}},fmtCr(s.netGEX))
      ));
    });
  }
  if(g.netGEX===0&&g.callGEX===0)body.appendChild(h('div',{style:{fontSize:'11px',color:'#4a7090',textAlign:'center',padding:'12px 0'}},'◌ Awaiting live GEX data…'));
  p.appendChild(body);return p;
}

function renderOI(d){
  const oi=d.oi,spot=d.spot;
  const oiC=oi.pcr>1.2?'#00ff9c':oi.pcr<0.8?'#ef5350':'#ffd54f';
  const p=h('div',{class:'panel'});
  const pcrLabel=oi.pcr>1.2?'BULLISH':oi.pcr<0.8?'BEARISH':'NEUTRAL';
  p.appendChild(h('div',{class:'ph'},
    h('span',{class:'ph-title'},'OI Intelligence'),
    h('span',{class:'ph-badge',style:{color:oiC,background:`${oiC}12`,borderColor:`${oiC}33`}},
      oi.pcr>0?`PCR ${fmt2(oi.pcr)} — ${pcrLabel}`:'PCR —'
    )
  ));
  const body=h('div',{class:'pbody'});

  function mc(label,val,sub,color){return h('div',{class:'mc'},h('span',{class:'mc-l'},label),h('span',{class:'mc-v',style:{color:color||'var(--t1)'}},String(val)),sub?h('span',{class:'mc-s'},sub):null)}
  const grid=h('div',{class:'mini-grid',style:{marginBottom:'6px'}});
  grid.appendChild(mc('PCR',oi.pcr>0?fmt2(oi.pcr):'—','put/call',oiC));
  grid.appendChild(mc('MAX PAIN',oi.maxPain?fmtI(oi.maxPain):'—','expiry','#4fc3f7'));
  const tot=(oi.totalCallOI||0)+(oi.totalPutOI||0);
  grid.appendChild(mc('TOTAL OI',tot>0?(tot/1e5).toFixed(1)+'L':'—'));
  grid.appendChild(mc('NET FLOW',oi.netPremiumFlow!=null?fmtCr(oi.netPremiumFlow):'—',null,(oi.netPremiumFlow||0)>0?'#00ff9c':'#ef5350'));
  body.appendChild(grid);

  const oiSumText=oi.pcr>1.2?'Put dominance → bullish (mm hedge)':oi.pcr<0.8?'Call dominance → market complacent':oi.pcr>0?'Balanced PCR → neutral':null;
  if(oiSumText)body.appendChild(h('div',{style:{fontSize:'11px',color:oiC,marginBottom:'6px',padding:'4px 7px',background:`${oiC}10`,borderRadius:'3px',border:`1px solid ${oiC}22`}},'◈ '+oiSumText));

  const tabs=h('div',{class:'oi-tabs'});
  [['near','NEAR ATM ±8%'],['tail','FII HEDGE / TAIL']].forEach(([key,label])=>{
    tabs.appendChild(h('button',{class:'oi-tab'+(oiView===key?(' active-'+key):''),onClick:()=>{oiView=key;oiScroll=0;render()}},label));
  });
  body.appendChild(tabs);

  const rows=oiView==='near'?oi.unusualOI:(oi.unusualOITailRisk||[]);
  const sorted=[...(rows||[])].sort((a,b)=>{const da=spot?Math.abs(a.strike-spot):0,db=spot?Math.abs(b.strike-spot):0;return da!==db?da-db:(a.type||'').toUpperCase()==='CALL'?-1:1});
  const visible=sorted.slice(oiScroll,oiScroll+OI_ROWS);
  const canUp=oiScroll>0,canDn=oiScroll+OI_ROWS<sorted.length;

  body.appendChild(h('div',{class:'oi-hdr'},h('span',{},''),h('span',{},'STRIKE'),h('span',{style:{textAlign:'right'}},'OI'),h('span',{style:{textAlign:'right'}},'VOL'),h('span',{style:{textAlign:'right'}},'DIST%')));
  if(visible.length===0){
    body.appendChild(h('div',{style:{fontSize:'11px',color:'#5a90a8',textAlign:'center',padding:'12px 0'}},oi.totalCallOI===0?'◌ Awaiting OI data…':'◌ No data'));
  }else{
    visible.forEach(u=>{
      const isCE=(u.type||'').toUpperCase()==='CALL';
      const dist=spot?calcP(u.strike,spot):null;
      const tc=isCE?'#4fc3f7':'#ff8a65';
      body.appendChild(h('div',{class:'oi-row'},
        h('span',{class:'oi-type',style:{background:`${tc}18`,color:tc,borderColor:`${tc}33`}},isCE?'CE':'PE'),
        h('span',{class:'oi-strike'},fmtI(u.strike)),
        h('span',{class:'oi-oi'},(u.oi||0).toLocaleString('en-IN')),
        h('span',{class:'oi-vol'},(u.vol||0).toLocaleString('en-IN')),
        h('span',{class:'oi-dist',style:{color:dist!=null?(dist>0?'#4fc3f7':'#ff8a65'):'#5a90a8'}},dist!=null?(dist>0?'+':'')+dist+'%':'—')
      ));
    });
  }
  const pgn=h('div',{class:'oi-pgn'});
  pgn.appendChild(h('span',{class:'pgn-info'},sorted.length>0?`${oiScroll+1}–${Math.min(oiScroll+OI_ROWS,sorted.length)} / ${sorted.length}`:'0'));
  const btns=h('div',{class:'pgn-btns'});
  btns.appendChild(h('button',{class:'pgn-btn',...(canUp?{onClick:()=>{oiScroll=Math.max(0,oiScroll-OI_ROWS);render()}}:{disabled:''})}, '▲'));
  btns.appendChild(h('button',{class:'pgn-btn',...(canDn?{onClick:()=>{oiScroll=Math.min(sorted.length-OI_ROWS,oiScroll+OI_ROWS);render()}}:{disabled:''})}, '▼'));
  pgn.appendChild(btns);
  body.appendChild(pgn);
  p.appendChild(body);return p;
}

function renderGann(g){
  const p=h('div',{class:'panel'});
  const frozen=g.frozen||!g.marketOpen;
  const ss=sigStyle(frozen?null:g.signal);
  const scoreColor=(g.strength||0)>=80?'#00ff64':(g.strength||0)>=60?'#ffa502':'#607a90';

  p.appendChild(h('div',{class:'ph'},
    h('span',{class:'ph-title'},'Gann Analysis'),
    g.ltp?h('span',{class:'ph-badge',style:{color:ss.text,background:`${ss.text}12`,borderColor:`${ss.text}33`}},frozen?'FROZEN':((g.signal||'NEUTRAL')+' '+Math.round(g.strength||0)+'%')):null
  ));

  if(!g||(!g.ltp&&g.status==='no_data')){
    const body=h('div',{class:'pbody'});
    body.appendChild(h('div',{style:{fontSize:'11px',color:'#c8d8e8',textAlign:'center',padding:'20px 0'}},'◌ Awaiting Gann data…'));
    body.appendChild(h('div',{style:{fontSize:'10px',color:'#4a7090',textAlign:'center'}},'Connect Upstox stream to activate'));
    p.appendChild(body);return p;
  }

  const body=h('div',{class:'pbody'});
  const msCfg=gannMktCfg();
  const msBar=h('div',{class:'gann-status'});
  msBar.style.cssText=msCfg.cls;
  msBar.appendChild(h('div',{class:'gann-status-dot',style:{background:msCfg.dotColor}}));
  msBar.appendChild(h('span',{style:{fontWeight:'700',color:msCfg.dotColor,fontSize:'11px'}},msCfg.label));
  msBar.appendChild(h('span',{style:{color:'var(--t4)',fontSize:'10px',marginLeft:'5px'}},msCfg.sub));
  body.appendChild(msBar);

  const tabs=h('div',{class:'gann-tabs'});
  [['fan','FAN CHART'],['sq9','SQUARE OF 9']].forEach(([key,label])=>{
    tabs.appendChild(h('button',{class:'gann-tab'+(g.tab===key?' active':''),onClick:()=>{g.tab=key;renderPanels()}},label));
  });
  body.appendChild(tabs);

  const sigCard=h('div',{class:'gann-sig-card',style:{background:frozen?'rgba(255,255,255,.02)':ss.bg,borderColor:frozen?'#2a3848':ss.border}});
  const sigRow=h('div',{class:'gann-sig-row'});
  sigRow.appendChild(h('span',{class:'gann-sig-icon'},frozen?'🔒':(ss.icon||'◆')));
  sigRow.appendChild(h('span',{class:'gann-sig-label',style:{color:frozen?'#5a7090':ss.text}},frozen?'MARKET CLOSED':(g.signal||'NEUTRAL')));
  if(!frozen)sigRow.appendChild(h('span',{class:'gann-sig-str',style:{color:scoreColor}},(g.strength||0)+'%'));
  else sigRow.appendChild(h('span',{style:{fontSize:'11px',color:'#4a7090',marginLeft:'auto'}},g.frozenAt?`frozen ${g.frozenAt}`:''));
  sigCard.appendChild(sigRow);
  if(!frozen){const sb=h('div',{class:'str-bar-bg'});sb.appendChild(h('div',{class:'str-bar-fill',style:{'--w':(g.strength||0)+'%',width:(g.strength||0)+'%',background:scoreColor}}));sigCard.appendChild(sb)}
  sigCard.appendChild(h('div',{class:'gann-rationale'},frozen?`Frozen at last LTP ${g.ltp?.toFixed(0)||'—'}`:(g.rationale||'Computing…')));
  body.appendChild(sigCard);

  if(g.ltp){
    const ds=h('div',{class:'gann-day-stats'});
    [['O',g.dayOpen,'var(--t2)'],['L',g.dayLow,'var(--green)'],['H',g.dayHigh,'var(--red)'],['LTP',g.ltp,frozen?'#5a7090':'#ffd54f']].forEach(([l,v,c])=>{
      if(!v)return;
      const d2=h('div',{class:'gds'});
      d2.appendChild(h('span',{class:'gds-l'},l));
      d2.appendChild(h('span',{class:'gds-v',style:{color:c}},Number(v).toFixed(0)));
      ds.appendChild(d2);
    });
    body.appendChild(ds);
  }

  if(g.tab==='fan'){
    const wrap=h('div',{class:'gann-fan-wrap'});
    wrap.innerHTML=buildGannFanSVG(g);
    if(frozen)wrap.innerHTML+=`<div class="gann-fan-frozen">🔒 Frozen — resumes 9:15 AM IST</div>`;
    body.appendChild(wrap);
    const legend=h('div',{class:'fan-legend'});
    GANN_FANS.forEach(f=>{const item=h('div',{class:'fan-leg-item'});item.appendChild(h('div',{class:'fan-leg-line',style:{background:f.color}}));item.appendChild(document.createTextNode(f.label));legend.appendChild(item)});
    body.appendChild(legend);
  }else{
    const ltp=g.ltp||0;
    const sq9=g.sq9Levels?.length?g.sq9Levels:computeSq9(ltp,4);
    body.appendChild(h('div',{class:'sec-hdr',style:{marginTop:'0'}},'KEY LEVELS — SQUARE OF 9'));
    const grid=h('div',{class:'sq9-grid'});
    sq9.slice(0,8).forEach(l=>{
      const isR=l.dir==='R';
      const col=isR?'#ff8090':'#00d460';
      const bg=isR?'rgba(255,71,87,.06)':'rgba(0,255,100,.06)';
      const bdr=isR?'rgba(255,71,87,.15)':'rgba(0,255,100,.15)';
      const dist=ltp?((l.level-ltp)/ltp*100).toFixed(2):null;
      const row=h('div',{class:'sq9-row',style:{background:bg,border:`1px solid ${bdr}`}});
      row.appendChild(h('span',{class:'sq9-lbl'},l.label));
      row.appendChild(h('span',{class:'sq9-val',style:{color:col}},l.level.toFixed(0)));
      if(dist)row.appendChild(h('span',{class:'sq9-dist'},(dist>0?'+':'')+dist+'%'));
      grid.appendChild(row);
    });
    body.appendChild(grid);
  }

  const srGrid=h('div',{class:'gann-sr-grid'});
  const supportsData=(g.sq9Levels||computeSq9(g.ltp||23000,3)).filter(l=>l.dir==='S').slice(0,3);
  const resistsData=(g.sq9Levels||computeSq9(g.ltp||23000,3)).filter(l=>l.dir==='R').slice(0,3);
  function srCol(title,items,color){
    const col=h('div',{class:'gann-sr-col'});
    col.appendChild(h('div',{class:'gann-sr-hdr'},title));
    items.forEach((item,i)=>{
      const row=h('div',{class:'gann-sr-row'});
      row.appendChild(h('span',{style:{color}},(title==='Supports'?'S':'R')+(i+1)+' '+fmtI(item.level||item.price||item)));
      row.appendChild(h('span',{style:{color:'var(--t3)',fontSize:'10px'}},item.source?.includes('Nine')?'SoN':item.source?.includes('Cardinal')?'Card':'SoN'));
      col.appendChild(row);
    });
    return col;
  }
  srGrid.appendChild(srCol('Supports',supportsData,'#00ff9c'));
  srGrid.appendChild(srCol('Resistances',resistsData,'#ef5350'));
  body.appendChild(srGrid);

  if(g.signalLog?.length>0){
    body.appendChild(h('div',{class:'sec-hdr'},'Signal Log'));
    g.signalLog.forEach((l,i)=>{
      const ls=sigStyle(l.signal);
      const row=h('div',{class:'gann-log-row',style:{opacity:String(1-i*0.15)}});
      row.appendChild(h('span',{style:{color:ls.text,fontWeight:'700'}},ls.icon+' '+l.signal));
      row.appendChild(h('span',{style:{color:'#ffd54f',marginLeft:'5px'}},l.ltp?.toFixed(0)||''));
      row.appendChild(h('span',{style:{color:'#2a4060',marginLeft:'auto'}},l.time||''));
      body.appendChild(row);
    });
  }

  p.appendChild(body);return p;
}

//  PANEL 4 — MARKET STRUCTURE
// ═══════════════════════════════════════════════════════════════════════════
function renderStructure(d){
  const st=d.structure,g=d.gex,oi=d.oi,spot=d.spot;
  const cw=g.callWall,pw=g.putWall,gf=g.gammaFlip;
  let rangePct=null;
  if(cw&&pw&&spot)rangePct=Math.max(0,Math.min(100,Math.round(((spot-pw)/(cw-pw))*100)));
  let zoneLabel,zoneColor;
  if(cw&&spot>=cw*.99){zoneLabel='At Call Wall — resistance';zoneColor='#4fc3f7'}
  else if(pw&&spot<=pw*1.01){zoneLabel='At Put Wall — support';zoneColor='#ff8a65'}
  else if(gf&&spot>=gf){zoneLabel='Above Gamma Flip — trend';zoneColor='#00ff9c'}
  else if(gf&&spot<gf){zoneLabel='Below Gamma Flip — MR';zoneColor='#ffd54f'}
  else if(spot>0){zoneLabel='Between walls';zoneColor='#4a9abb'}
  else{zoneLabel='Awaiting data';zoneColor='#4a7090'}

  const p=h('div',{class:'panel'});
  p.appendChild(h('div',{class:'ph'},
    h('span',{class:'ph-title'},'Market Structure'),
    h('span',{class:'ph-badge',style:{color:zoneColor,background:`${zoneColor}12`,borderColor:`${zoneColor}33`}},zoneLabel)
  ));
  const body=h('div',{class:'pbody'});

  if(spot>0){body.appendChild(h('span',{style:{fontSize:'15px',fontWeight:'700',color:'var(--t1)',marginBottom:'6px',display:'block'}},`₹${fmtI(spot)}`))}

  if(rangePct!==null){
    const wrap=h('div',{class:'range-wrap'});
    wrap.appendChild(h('div',{class:'range-lbls'},h('span',{},'PUT '+fmtI(pw)),h('span',{style:{color:'var(--t1)'}},rangePct+'% in range'),h('span',{},'CALL '+fmtI(cw))));
    const track=h('div',{class:'range-track'});
    track.appendChild(h('div',{class:'range-fill',style:{width:rangePct+'%'}}));
    track.appendChild(h('div',{class:'range-needle',style:{left:rangePct+'%'}}));
    wrap.appendChild(track);body.appendChild(wrap);
  }

  function mc(label,val,sub,color){return h('div',{class:'mc'},h('span',{class:'mc-l'},label),h('span',{class:'mc-v',style:{color:color||'var(--t1)'}},String(val)),sub?h('span',{class:'mc-s'},sub):null)}
  const mg=h('div',{class:'mini-grid',style:{marginBottom:'7px'}});
  mg.appendChild(mc('SUPPORT (OI)',st.supportFromOI?fmtI(st.supportFromOI):'—','put OI wall','#00ff9c'));
  mg.appendChild(mc('RESIST (OI)',st.resistanceFromOI?fmtI(st.resistanceFromOI):'—','call OI wall','#ef5350'));
  body.appendChild(mg);

  function lvRow(label,val,color){body.appendChild(h('div',{class:'lvl-row'},h('span',{class:'lvl-lbl'},label),h('span',{class:'lvl-val',style:{color}},val)))}
  if(cw&&spot){const d2=calcP(cw,spot);lvRow('↑ Call Wall',`+${Math.abs(d2).toFixed(1)}% ₹${fmtI(cw-spot)}`,'#4fc3f7')}
  if(pw&&spot){const d2=calcP(spot,pw);lvRow('↓ Put Wall',`-${Math.abs(d2).toFixed(1)}% ₹${fmtI(spot-pw)}`,'#ff8a65')}
  if(gf&&spot){const abv=spot>gf,d2=calcP(gf,spot);lvRow('γ Flip',(abv?'+':'-')+Math.abs(d2).toFixed(1)+'% ₹'+fmtI(gf),abv?'#00ff9c':'#ffd54f')}
  if(oi.maxPain)lvRow('⊗ Max Pain','₹'+fmtI(oi.maxPain),'#a8c8e0');
  if(oi.pcr>0)lvRow('⊕ PCR',oi.pcr.toFixed(2)+' — '+(oi.pcr>1.2?'bullish':oi.pcr<0.8?'bearish':'neutral'),oi.pcr>1.2?'#00ff9c':oi.pcr<0.8?'#ef5350':'#ffd54f');

  if(st.ivEnvironment){
    const ivMap={RICH_SELL_PREMIUM:{label:'RICH — SELL PREMIUM',color:'#ef5350'},ELEVATED:{label:'ELEVATED',color:'#ff8a65'},NORMAL:{label:'NORMAL',color:'#a0b8cc'},CHEAP_BUY_OPTIONS:{label:'CHEAP — BUY OPTIONS',color:'#00ff9c'},VERY_CHEAP:{label:'VERY CHEAP',color:'#00ff9c'},MIXED_IV:{label:'MIXED IV',color:'#ffd54f'}};
    const iv=ivMap[st.ivEnvironment]||{label:st.ivEnvironment.replace(/_/g,' '),color:'#a0b8cc'};
    body.appendChild(h('div',{style:{fontSize:'11px',color:'#a0b8cc',marginTop:'7px',display:'flex',alignItems:'center',gap:'5px'}},
      h('span',{},'IV env:'),h('span',{style:{color:iv.color,fontWeight:'700'}},iv.label)
    ));
    if(st.ivEnvironment==='MIXED_IV'){
      body.appendChild(h('div',{style:{fontSize:'10px',color:'#ffd54f88',marginTop:'4px',lineHeight:'1.5',padding:'4px 6px',background:'#1a100033',borderRadius:'2px',border:'1px solid #ffd54f22'}},'IV Rank high vs history but cheap vs realized. Avoid premium selling.'));
    }
  }
  if(st.straddlePrice>0){
    body.appendChild(h('div',{class:'straddle-row'},h('span',{style:{color:'var(--t2)'}},'ATM Straddle'),h('span',{style:{color:'var(--t1)',fontWeight:'700'}},'₹'+fmt2(st.straddlePrice))));
  }
  p.appendChild(body);return p;
}

// ═══════════════════════════════════════════════════════════════════════════
//  MAIN RENDER
// ═══════════════════════════════════════════════════════════════════════════
function renderPanels(){
  const d=STATE[active];
  const g=GANN[active];
  const panels=document.getElementById('panels');
  panels.innerHTML='';
  panels.appendChild(renderGEX(d));
  panels.appendChild(renderOI(d));
  panels.appendChild(renderGann(g));
  panels.appendChild(renderStructure(d));
}

function render(){
  renderTopbar();
  renderTicker();
  renderISKRow();
  renderPanels();
}

render();
setInterval(()=>render(),30000);
</script>
</body>
